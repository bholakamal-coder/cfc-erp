<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CFC ERP v2 — Ceradrive Brakes</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }
  .login-wrap {
    width: 100%;
    max-width: 420px;
  }
  .card {
    background: #fff;
    border: 1px solid #dde3ea;
    border-radius: 10px;
    padding: 2.25rem 2.5rem 2.5rem;
    box-shadow: 0 3px 18px rgba(0,0,0,0.08);
  }
  .logo-area {
    text-align: center;
    margin-bottom: 1.75rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid #edf0f4;
  }
  .logo-area img {
    height: 72px;
    width: auto;
    object-fit: contain;
  }
  .erp-badge {
    margin-top: 8px;
    display: inline-block;
    background: #1c2d42;
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 3px 10px;
    border-radius: 20px;
    text-transform: uppercase;
  }
  h2 {
    font-size: 17px;
    font-weight: 600;
    color: #1a2635;
    text-align: center;
    margin-bottom: 1.5rem;
  }
  .alert {
    display: none;
    font-size: 13px;
    border-radius: 6px;
    padding: 9px 12px;
    margin-bottom: 1rem;
    border: 1px solid;
  }
  .alert.error { color: #991b1b; background: #fef2f2; border-color: #fecaca; display: block; }
  .alert.success { color: #166534; background: #f0fdf4; border-color: #bbf7d0; display: block; }
  .field { margin-bottom: 1rem; }
  label {
    display: block;
    font-size: 12.5px;
    font-weight: 600;
    color: #4a5568;
    margin-bottom: 5px;
    letter-spacing: 0.2px;
  }
  input {
    width: 100%;
    border: 1px solid #cbd5e0;
    border-radius: 6px;
    padding: 9px 12px;
    font-size: 14px;
    color: #1a2635;
    background: #f9fafb;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  input:focus {
    border-color: #e63232;
    box-shadow: 0 0 0 3px rgba(230,50,50,0.12);
    background: #fff;
  }
  input::placeholder { color: #b0bec5; }
  .forgot {
    text-align: right;
    margin: -4px 0 1.25rem;
  }
  .forgot a {
    font-size: 12px;
    color: #e63232;
    text-decoration: none;
  }
  .forgot a:hover { text-decoration: underline; }
  .remember-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
  }
  .remember-label {
    display: flex;
    align-items: center;
    gap: 7px;
    cursor: pointer;
    font-size: 13px;
    color: #4a5568;
    user-select: none;
  }
  .remember-label input[type="checkbox"] {
    width: 15px;
    height: 15px;
    accent-color: #cc2200;
    cursor: pointer;
    margin: 0;
    padding: 0;
    border: none;
    background: none;
    box-shadow: none;
  }
  .remember-label input[type="checkbox"]:focus {
    box-shadow: none;
    border: none;
  }
  .btn-signin {
    width: 100%;
    background: #cc2200;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 11px;
    font-size: 14.5px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: background 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-signin:hover { background: #b31e00; }
  .btn-signin:active { transform: scale(0.99); }
  .btn-signin:disabled { background: #999; cursor: not-allowed; }
  .spinner {
    display: none;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .footer {
    text-align: center;
    margin-top: 1.75rem;
    font-size: 11.5px;
    color: #9aa5b4;
  }
  .footer strong { color: #cc2200; }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="card">

    <div class="logo-area">
      <img src="cdlogo.png" alt="Ceradrive Brakes Logo"/>
      <br/>
      <span class="erp-badge">CFC ERP v2</span>
    </div>

    <h2>Sign in to your account</h2>

    <div class="alert" id="alert-msg"></div>

    <div class="field">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="you@ceradrive.com" autocomplete="email"/>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>

    <div class="remember-row">
      <label class="remember-label">
        <input type="checkbox" id="remember-me"/>
        Remember me
      </label>
      <div class="forgot" style="margin:0"><a href="#">Forgot password?</a></div>
    </div>

    <button class="btn-signin" id="signin-btn" onclick="handleLogin()">
      <span class="spinner" id="spinner"></span>
      <span id="btn-text">Sign In</span>
    </button>

    <div class="footer">
      &copy; 2026 <strong>Ceradrive Brakes</strong> &nbsp;·&nbsp; CFC ERP v2 &nbsp;·&nbsp; Powered by Supabase
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://sdopdeqepjoshbzrpbmi.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_eWBMrAFa7Yyvtlb-7-8IGA_KxfE7v_8';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  function showAlert(msg, type) {
    const el = document.getElementById('alert-msg');
    el.textContent = msg;
    el.className = 'alert ' + type;
  }

  function setLoading(loading) {
    const btn = document.getElementById('signin-btn');
    const spinner = document.getElementById('spinner');
    const text = document.getElementById('btn-text');
    btn.disabled = loading;
    spinner.style.display = loading ? 'block' : 'none';
    text.textContent = loading ? 'Signing in...' : 'Sign In';
  }

  async function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const rememberMe = document.getElementById('remember-me').checked;

    if (!email || !password) {
      showAlert('Please enter both email and password.', 'error');
      return;
    }

    setLoading(true);

    const { data, error } = await sb.auth.signInWithPassword({ email, password });

    setLoading(false);

    if (error) {
      showAlert('Invalid email or password. Please try again.', 'error');
      return;
    }

    if (rememberMe) {
      localStorage.setItem('erp_remember_email', email);
    } else {
      localStorage.removeItem('erp_remember_email');
    }

    showAlert('Login successful! Redirecting...', 'success');
    setTimeout(() => {
      window.location.href = 'dashboard.html';
    }, 800);
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleLogin();
  });

  // Auto-redirect if already logged in
  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session) window.location.href = 'dashboard.html';

    // Fill saved email if remember me was checked
    const savedEmail = localStorage.getItem('erp_remember_email');
    if (savedEmail) {
      document.getElementById('email').value = savedEmail;
      document.getElementById('remember-me').checked = true;
    }
  })();
</script>
</body>
</html>
