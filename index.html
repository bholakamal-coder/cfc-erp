<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Ceradrive Brakes — ERP</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ══ CERADRIVE ERP — LIGHT THEME ══ */
:root {
  --red: #e31e24;
  --red-d: #b91c1c;
  --red-l: #fff0f0;
  --red-l2: #ffd9d9;
  --green: #16a34a;
  --green-l: #f0fdf4;
  --amber: #d97706;
  --amber-l: #fffbeb;
  --blue: #2563eb;
  --blue-l: #eff6ff;
  --purple: #7c3aed;
  --purple-l: #f5f3ff;

  --bg: #f4f5f7;
  --white: #ffffff;
  --border: #e1e4e8;
  --border-d: #c8cdd4;
  --text: #1a202c;
  --text2: #4a5568;
  --text3: #a0aec0;

  --sidebar-w: 220px;
  --topbar-h: 52px;
  --r: 6px;
  --r-md: 8px;
  --sh: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
  --sh-lg: 0 10px 25px rgba(0,0,0,.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); font-size: 13px; line-height: 1.5; }

/* ── TOPBAR ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; height: var(--topbar-h);
  background: var(--white); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; z-index: 100; box-shadow: var(--sh);
}
.topbar-logo {
  width: var(--sidebar-w); height: 100%;
  display: flex; align-items: center; padding: 0 16px;
  border-right: 1px solid var(--border); flex-shrink: 0; gap: 8px;
}
.topbar-logo img { height: 32px; object-fit: contain; }
.topbar-search {
  flex: 1; padding: 0 16px;
}
.topbar-search input {
  width: 100%; max-width: 360px; background: var(--bg);
  border: 1px solid var(--border); border-radius: 20px;
  padding: 6px 14px; font-family: inherit; font-size: 12px;
  color: var(--text); outline: none;
}
.topbar-search input:focus { border-color: var(--red); background: var(--white); }
.topbar-right { display: flex; align-items: center; gap: 4px; padding: 0 14px; }
.topbar-btn {
  width: 32px; height: 32px; border-radius: var(--r); border: none;
  background: transparent; cursor: pointer; color: var(--text2);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; text-decoration: none; transition: all .15s;
}
.topbar-btn:hover { background: var(--bg); color: var(--red); }
.topbar-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
.user-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--red); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; cursor: pointer;
}

/* ── SIDEBAR ── */
.sidebar {
  position: fixed; top: var(--topbar-h); left: 0; bottom: 0;
  width: var(--sidebar-w); background: var(--white);
  border-right: 1px solid var(--border);
  overflow-y: auto; z-index: 50;
  display: flex; flex-direction: column;
}
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border-d); border-radius: 2px; }

.sb-group { padding: 16px 0 4px; }
.sb-label {
  padding: 0 14px 4px;
  font-size: 10px; font-weight: 700; color: var(--text3);
  text-transform: uppercase; letter-spacing: .08em;
}
.sb-item {
  display: flex; align-items: center; gap: 9px;
  padding: 7px 12px; margin: 1px 6px;
  border-radius: var(--r); cursor: pointer;
  color: var(--text2); font-size: 13px; font-weight: 400;
  border: none; background: transparent;
  width: calc(100% - 12px); text-align: left;
  transition: all .12s;
}
.sb-item:hover { background: var(--bg); color: var(--text); }
.sb-item.active { background: var(--red-l); color: var(--red); font-weight: 600; }
.sb-item.active .sb-icon { color: var(--red); }
.sb-icon { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }

.sb-divider { height: 1px; background: var(--border); margin: 8px 12px; }
.sb-footer { padding: 10px 8px; margin-top: auto; border-top: 1px solid var(--border); }
.sb-footer a {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; border-radius: var(--r);
  color: var(--text2); font-size: 12px; text-decoration: none;
  transition: all .15s;
}
.sb-footer a:hover { background: var(--red-l); color: var(--red); }

/* ── MAIN ── */
.main { margin-left: var(--sidebar-w); margin-top: var(--topbar-h); min-height: calc(100vh - var(--topbar-h)); }
.page-toolbar {
  background: var(--white); border-bottom: 1px solid var(--border);
  padding: 8px 20px; display: flex; align-items: center; gap: 8px;
  flex-wrap: wrap; min-height: 44px;
}
.page-toolbar:empty { display: none; }
.page-body { padding: 20px; }

/* ── LOGIN ── */
.login-page { display: flex; min-height: 100vh; }
.login-left {
  width: 420px; background: var(--red); flex-shrink: 0;
  padding: 48px 40px; display: flex; flex-direction: column; justify-content: center;
}
.login-left img { height: 56px; object-fit: contain; margin-bottom: 24px; filter: brightness(0) invert(1); }
.login-brand { font-size: 26px; font-weight: 700; color: #fff; margin-bottom: 6px; }
.login-sub { font-size: 13px; color: rgba(255,255,255,.8); margin-bottom: 28px; line-height: 1.6; }
.login-features { display: flex; flex-direction: column; gap: 8px; }
.login-features div { color: rgba(255,255,255,.9); font-size: 13px; }
.login-right { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px; background: var(--bg); }
.login-card {
  background: var(--white); border: 1px solid var(--border);
  border-radius: 10px; padding: 32px; width: 100%; max-width: 380px;
  box-shadow: var(--sh-lg);
}
.login-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.login-subtitle { font-size: 13px; color: var(--text2); margin-bottom: 22px; }

/* ── CARDS ── */
.card { background: var(--white); border: 1px solid var(--border); border-radius: var(--r); box-shadow: var(--sh); margin-bottom: 14px; }
.card-head { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.card-title { font-size: 14px; font-weight: 600; }
.card-body { padding: 14px 16px; }

/* ── STATS ── */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 16px; }
.stat { background: var(--white); border: 1px solid var(--border); border-radius: var(--r); padding: 14px 16px; box-shadow: var(--sh); position: relative; overflow: hidden; }
.stat::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--red); }
.stat.green::before { background: var(--green); }
.stat.amber::before { background: var(--amber); }
.stat.blue::before { background: var(--blue); }
.stat-label { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
.stat-val { font-size: 26px; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: var(--text); }
.stat-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }

/* ── TABLES ── */
.table-wrap { background: var(--white); border: 1px solid var(--border); border-radius: var(--r); box-shadow: var(--sh); overflow: hidden; margin-bottom: 14px; }
.table-head { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; background: #fafbfc; }
.table-title { font-size: 14px; font-weight: 600; }
table { width: 100%; border-collapse: collapse; }
thead { background: #fafbfc; }
th { padding: 8px 14px; text-align: left; font-size: 10px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid var(--border); white-space: nowrap; }
td { padding: 9px 14px; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tbody tr:hover { background: #fafbfc; }
.empty-row td { text-align: center; color: var(--text3); padding: 32px; font-style: italic; }

/* ── BUTTONS ── */
.btn { padding: 6px 14px; border-radius: var(--r); font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid transparent; transition: all .15s; display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; }
.btn-primary { background: var(--red); color: #fff; border-color: var(--red); }
.btn-primary:hover { background: var(--red-d); }
.btn-secondary, .btn-ghost { background: var(--white); color: var(--text); border-color: var(--border); }
.btn-secondary:hover, .btn-ghost:hover { background: var(--bg); }
.btn-success, .btn-green { background: var(--green); color: #fff; border-color: var(--green); }
.btn-danger, .btn-red { background: #dc2626; color: #fff; border-color: #dc2626; }
.btn-warning, .btn-amber { background: var(--amber); color: #fff; border-color: var(--amber); }
.btn-sm { padding: 3px 8px; font-size: 12px; }
.btn-xs { padding: 2px 6px; font-size: 11px; }
.btn:disabled { opacity: .5; cursor: not-allowed; }

/* ── BADGES ── */
.badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.badge-ok, .badge-pass, .badge-success { background: #dcfce7; color: #166534; }
.badge-red, .badge-fail, .badge-danger, .badge-cancel { background: #fee2e2; color: #991b1b; }
.badge-warn, .badge-warning { background: #fef3c7; color: #92400e; }
.badge-info, .badge-mto { background: #dbeafe; color: #1e40af; }
.badge-secondary { background: #f1f5f9; color: #475569; }
.badge-rm { background: #fce7f3; color: #9d174d; }
.badge-sfg { background: #ede9fe; color: #6d28d9; }
.badge-fg { background: #dcfce7; color: #166534; }
.badge-mts { background: #fef3c7; color: #92400e; }

/* ── FORMS ── */
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.form-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
.form-label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .04em; }
.form-input, .form-select {
  width: 100%; background: var(--white); border: 1px solid var(--border);
  border-radius: var(--r); padding: 8px 10px;
  font-family: inherit; font-size: 13px; color: var(--text); outline: none;
  transition: border .15s;
}
.form-input:focus, .form-select:focus { border-color: var(--red); box-shadow: 0 0 0 3px rgba(227,30,36,.08); }
.form-input::placeholder { color: var(--text3); }
.form-textarea { width: 100%; background: var(--white); border: 1px solid var(--border); border-radius: var(--r); padding: 8px 10px; font-family: inherit; font-size: 13px; color: var(--text); outline: none; min-height: 70px; resize: vertical; }
.form-textarea:focus { border-color: var(--red); box-shadow: 0 0 0 3px rgba(227,30,36,.08); }
.err-msg { color: #dc2626; font-size: 12px; margin-top: 3px; }

/* ── MODAL ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 16px; backdrop-filter: blur(2px); }
.modal { background: var(--white); border-radius: var(--r-md); width: 100%; max-width: 640px; max-height: 92vh; overflow-y: auto; box-shadow: var(--sh-lg); }
.modal-head { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--white); z-index: 1; }
.modal-title { font-size: 15px; font-weight: 700; }
.modal-close { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 20px; line-height: 1; padding: 2px 6px; border-radius: 4px; }
.modal-close:hover { background: var(--bg); color: var(--text); }
.modal-body { padding: 18px; }
.modal-footer { padding: 12px 18px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; background: #fafbfc; border-radius: 0 0 var(--r-md) var(--r-md); }

/* ── LIVE SEARCH ── */
.ls-wrap { position: relative; width: 100%; }
.ls-input {
  width: 100%; background: var(--white); border: 1px solid var(--border);
  border-radius: var(--r); padding: 8px 10px; font-family: inherit;
  font-size: 13px; color: var(--text); outline: none; transition: border .15s;
}
.ls-input:focus { border-color: var(--red); box-shadow: 0 0 0 3px rgba(227,30,36,.08); }
.ls-drop {
  position: absolute; top: calc(100% + 2px); left: 0; right: 0;
  background: var(--white); border: 1px solid var(--red);
  border-radius: var(--r); z-index: 9999; max-height: 240px;
  overflow: hidden; display: none; flex-direction: column;
  box-shadow: var(--sh-lg);
}
.ls-drop.open { display: flex; }
.ls-list { overflow-y: auto; max-height: 200px; }
.ls-item {
  padding: 8px 12px; cursor: pointer; font-size: 13px;
  border-bottom: 1px solid var(--border); transition: background .1s;
}
.ls-item:last-child { border-bottom: none; }
.ls-item:hover, .ls-item.active { background: var(--red-l); color: var(--red); }
.ls-item-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
.ls-add {
  padding: 8px 12px; cursor: pointer; font-size: 13px;
  color: var(--green); border-top: 1px solid var(--border);
  font-weight: 600; display: flex; align-items: center; gap: 6px;
  background: var(--white); flex-shrink: 0;
}
.ls-add:hover { background: var(--green-l); }
.ls-empty { padding: 12px; font-size: 12px; color: var(--text3); text-align: center; }
.ls-selected {
  margin-top: 5px; background: var(--red-l); border-radius: var(--r);
  padding: 6px 10px; font-size: 13px; display: none;
  align-items: center; justify-content: space-between; gap: 8px;
}
.ls-selected.show { display: flex; }
.ls-selected-text { font-weight: 500; color: var(--red); flex: 1; }
.ls-clear { background: none; border: none; color: #dc2626; cursor: pointer; font-size: 16px; line-height: 1; }

/* ── MISC ── */
.action-btns { display: flex; gap: 4px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.loader { display: flex; align-items: center; justify-content: center; padding: 40px; gap: 10px; color: var(--text3); font-size: 13px; }
.spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--red); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes popIn { from { opacity: 0; transform: translate(-50%,-50%) scale(.85) } to { opacity: 1; transform: translate(-50%,-50%) scale(1) } }
#cfc-toast { display: none; position: fixed; bottom: 20px; right: 20px; background: var(--text); color: #fff; padding: 10px 16px; border-radius: var(--r); font-size: 13px; font-weight: 500; z-index: 9999; box-shadow: var(--sh-lg); border-left: 3px solid var(--red); max-width: 280px; }
.mono { font-family: 'JetBrains Mono', monospace; }
.alert { padding: 10px 14px; border-radius: var(--r); font-size: 13px; margin-bottom: 12px; }
.alert-info { background: var(--blue-l); border: 1px solid #bfdbfe; color: #1e40af; }
.alert-warn { background: var(--amber-l); border: 1px solid #fde68a; color: #92400e; }
.alert-success { background: var(--green-l); border: 1px solid #bbf7d0; color: #166534; }
@media(max-width:768px) {
  .sidebar { width: 52px; }
  .sb-item span:not(.sb-icon), .sb-label, .sb-footer { display: none; }
  .main { margin-left: 52px; }
  .form-row, .form-row-3, .grid2 { grid-template-columns: 1fr; }
  .topbar-search { display: none; }
  .login-left { display: none; }
}
</style>
</head>

// ══ CORE ══
function showModal(html) {
  document.getElementById('modal-root').innerHTML =
    '<div class="modal-overlay" onclick="if(event.target===this)closeModal()">' + html + '</div>';
}
function closeModal() {
  document.getElementById('modal-root').innerHTML = '';
  loadPage();
}
function showToast(msg, dur=3000) {
  const t = document.getElementById('cfc-toast');
  t.textContent = msg; t.style.display = 'block';
  clearTimeout(t._t); t._t = setTimeout(() => t.style.display = 'none', dur);
}
function showSaved(msg='✓ Saved!') {
  const p = document.createElement('div');
  p.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.85);background:#fff;border:2px solid #e31e24;border-radius:10px;padding:16px 28px;font-size:15px;font-weight:700;color:#e31e24;z-index:9999;box-shadow:0 10px 30px rgba(0,0,0,.15);animation:popIn .2s ease forwards';
  p.textContent = '✅ ' + msg;
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 1800);
}
function setBtn(btn, loading, txt='Saving...', orig=null) {
  if (!btn) return;
  if (loading) { btn._orig = orig || btn.textContent; btn.disabled = true; btn.innerHTML = '<span class="spinner" style="width:12px;height:12px;border-width:2px;display:inline-block;vertical-align:middle;margin-right:5px"></span>' + txt; btn.style.opacity = '.8'; }
  else { btn.disabled = false; btn.textContent = btn._orig || orig || 'Save'; btn.style.opacity = '1'; }
}
function delConfirm(table, id, name) {
  if (!confirm('Delete "' + name + '"?')) return;
  db.from(table).delete().eq('id', id).then(() => { showToast('✓ Deleted'); loadPage(); });
}
function sc(s) {
  const m = { Passed:'ok',Completed:'ok',Active:'ok',Dispatched:'ok',Complete:'ok',Received:'ok',
    Failed:'red',Cancelled:'red',Rejected:'red',
    Pending:'warn','In Progress':'warn',Planned:'warn',Ordered:'warn',Draft:'warn',
    MTO:'mto',MTS:'mts',RM:'rm',SFG:'sfg',FG:'fg' };
  return m[s] || 'secondary';
}

// ══ LIVE SEARCH ══
/*
  ls(containerId, options, cfg)
  options: [{id, label, sub, meta}]
  cfg: {placeholder, selected, onSelect, onAdd, addLabel}
*/
function ls(cid, options, cfg={}) {
  const wrap = document.getElementById(cid);
  if (!wrap) return;
  wrap._ls = { options: [...options], cfg, selectedId: cfg.selected || null };
  const sel = options.find(o => o.id == cfg.selected);
  wrap.innerHTML = `
    <div class="ls-wrap">
      <input class="ls-input" id="lsi-${cid}" placeholder="${cfg.placeholder || 'Search...'}"
        value="" autocomplete="off"
        onfocus="lsOpen('${cid}')"
        oninput="lsFilter('${cid}')"
        onkeydown="lsKey(event,'${cid}')"/>
      <div class="ls-drop" id="lsd-${cid}">
        <div class="ls-list" id="lsl-${cid}"></div>
        ${cfg.onAdd ? `<div class="ls-add" onclick="lsAdd('${cid}')">＋ ${cfg.addLabel || 'Add New'}</div>` : ''}
      </div>
      <div class="ls-selected ${sel ? 'show' : ''}" id="lssel-${cid}">
        <span class="ls-selected-text" id="lsstxt-${cid}">${sel ? sel.label : ''}</span>
        <button class="ls-clear" onclick="lsClear('${cid}')">×</button>
      </div>
    </div>`;

  // Close on outside click
  setTimeout(() => {
    document.addEventListener('click', function lsOut(e) {
      const d = document.getElementById('lsd-' + cid);
      const i = document.getElementById('lsi-' + cid);
      if (d && i && !d.contains(e.target) && e.target !== i) {
        d.classList.remove('open');
        document.removeEventListener('click', lsOut);
      }
    });
  }, 0);
}

function lsOpen(cid) {
  const w = document.getElementById(cid);
  if (!w || !w._ls) return;
  lsRender(cid, w._ls.options);
  document.getElementById('lsd-' + cid).classList.add('open');
}
function lsFilter(cid) {
  const w = document.getElementById(cid);
  if (!w || !w._ls) return;
  const q = (document.getElementById('lsi-' + cid).value || '').toLowerCase();
  const filtered = q ? w._ls.options.filter(o =>
    (o.label || '').toLowerCase().indexOf(q) >= 0 ||
    (o.sub || '').toLowerCase().indexOf(q) >= 0
  ) : w._ls.options;
  lsRender(cid, filtered);
  document.getElementById('lsd-' + cid).classList.add('open');
  w._ls._filtered = filtered;
  w._ls._hi = -1;
}
function lsRender(cid, opts) {
  const list = document.getElementById('lsl-' + cid);
  if (!list) return;
  if (!opts.length) { list.innerHTML = '<div class="ls-empty">No results</div>'; return; }
  list.innerHTML = opts.slice(0, 50).map(function(o) {
    return '<div class="ls-item" onclick="lsSel(\'' + cid + '\',\'' + o.id + '\')">' +
      '<div>' + o.label + '</div>' +
      (o.sub ? '<div class="ls-item-sub">' + o.sub + '</div>' : '') +
      '</div>';
  }).join('');
}
function lsKey(e, cid) {
  const w = document.getElementById(cid);
  if (!w || !w._ls) return;
  const f = w._ls._filtered || w._ls.options;
  const items = document.querySelectorAll('#lsl-' + cid + ' .ls-item');
  if (e.key === 'ArrowDown') { e.preventDefault(); w._ls._hi = Math.min((w._ls._hi || -1) + 1, items.length - 1); items.forEach((el, i) => el.classList.toggle('active', i === w._ls._hi)); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); w._ls._hi = Math.max((w._ls._hi || 0) - 1, 0); items.forEach((el, i) => el.classList.toggle('active', i === w._ls._hi)); }
  else if (e.key === 'Enter') { e.preventDefault(); const hi = w._ls._hi >= 0 ? w._ls._hi : 0; if (f[hi]) lsSel(cid, f[hi].id); }
  else if (e.key === 'Escape') { document.getElementById('lsd-' + cid).classList.remove('open'); }
}
function lsSel(cid, optId) {
  const w = document.getElementById(cid);
  if (!w || !w._ls) return;
  const opt = w._ls.options.find(o => o.id == optId);
  if (!opt) return;
  w._ls.selectedId = optId;
  document.getElementById('lsi-' + cid).value = '';
  document.getElementById('lsi-' + cid).placeholder = opt.label;
  const sel = document.getElementById('lssel-' + cid);
  const txt = document.getElementById('lsstxt-' + cid);
  if (sel) sel.className = 'ls-selected show';
  if (txt) txt.textContent = opt.label + (opt.sub ? ' (' + opt.sub + ')' : '');
  document.getElementById('lsd-' + cid).classList.remove('open');
  if (w._ls.cfg.onSelect) w._ls.cfg.onSelect(optId, opt);
}
function lsClear(cid) {
  const w = document.getElementById(cid);
  if (!w || !w._ls) return;
  w._ls.selectedId = null;
  const i = document.getElementById('lsi-' + cid);
  if (i) { i.value = ''; i.placeholder = w._ls.cfg.placeholder || 'Search...'; }
  const sel = document.getElementById('lssel-' + cid);
  if (sel) sel.className = 'ls-selected';
}
function lsGet(cid) { return document.getElementById(cid)?._ls?.selectedId || null; }
async function lsAdd(cid) {
  const w = document.getElementById(cid);
  if (!w || !w._ls || !w._ls.cfg.onAdd) return;
  document.getElementById('lsd-' + cid).classList.remove('open');
  const q = document.getElementById('lsi-' + cid).value || '';
  const result = await w._ls.cfg.onAdd(q);
  if (result) { w._ls.options.unshift(result); lsSel(cid, result.id); }
}

    'mrp-plan': pgMRP, live: pgLive,

    purchase: pgPurchase, grn: pgGRN, suppliers: pgSuppliers,

}

async function saveBOM(id) {
  const itemId = lsGet('bom-item-ls');
  if (!itemId) { document.getElementById('b-err').textContent = 'Select an item.'; return; }
  const btn = document.getElementById('save-bom');
  setBtn(btn, true, id ? 'Updating...' : 'Creating...');
  const bpw = parseFloat(document.getElementById('b-bpw').value) || 0;
  const tray = parseInt(document.getElementById('b-tray').value) || 0;
  const payload = {
    item_id: parseInt(itemId),
    output_qty: parseFloat(document.getElementById('b-qty').value) || 1,
    output_uom: document.getElementById('b-uom').value,
    version: parseInt(document.getElementById('b-ver').value) || 1,
    is_active: document.getElementById('b-active').value === 'true',
    notes: document.getElementById('b-notes').value,
    bp_weight_grams: bpw,
    preform_weight_grams: parseFloat(document.getElementById('b-pfw').value) || 0,
    cavity_count: parseInt(document.getElementById('b-cav').value) || 0,
    pcs_per_tray: tray,
    pcs_per_set: parseInt(document.getElementById('b-set').value) || 4,
    die_id: document.getElementById('b-die').value || null,
    mix_item_id: document.getElementById('b-mix').value || null,
    shot_blast_batch_pcs: bpw > 0 ? Math.round(60000 / bpw) : 0,
    oven_full_load_pcs: tray > 0 ? tray * 72 : 0
  };
  const { error } = id ? await db.from('bom_headers').update(payload).eq('id', id) : await db.from('bom_headers').insert(payload);
  if (error) { document.getElementById('b-err').textContent = error.message; setBtn(btn, false, '', id ? 'Update BOM' : 'Create BOM'); return; }
  closeModal(); showSaved(id ? 'BOM Updated!' : 'BOM Created!');
}

async function addBOMLine(bomId) {
  const sel = lsGet('bl-search-wrap');
  if (!sel) { document.getElementById('bl-err').textContent = 'Select a component.'; return; }
  const wrap = document.getElementById('bl-search-wrap');
  const opt = wrap?._ls?.options?.find(o => o.id == sel);
  const payload = {
    bom_id: parseInt(bomId),
    component_item_id: opt?._itemId ? parseInt(opt._itemId) : null,
    qty: parseFloat(document.getElementById('bl-qty').value) || 1,
    uom: document.getElementById('bl-uom').value || 'KG',
    is_optional: document.getElementById('bl-opt').value === 'true',
    notes: opt?._machId ? 'Machine: ' + opt.label : null
  };
  const { error } = await db.from('bom_lines').insert(payload);
  if (error) { document.getElementById('bl-err').textContent = error.message; return; }
  showSaved('Component Added!');
  showBOMLines(bomId);
}

async function delBOMLine(lineId, bomId) {
  await db.from('bom_lines').delete().eq('id', lineId);
  showBOMLines(bomId);
}

async function showPOModal(poId = null) {
  const isEdit = !!poId;
  let po = null, existingLines = [];
  if (isEdit) {
    const [{ data: p }, { data: l }] = await Promise.all([
      db.from('purchase_orders').select('*').eq('id', poId).single(),
      db.from('purchase_order_lines').select('*, items(id, code, name, uom)').eq('po_id', poId)
    ]);
    po = p; existingLines = l || [];
  }
  const { data: sups } = await db.from('suppliers').select('id, name').eq('is_active', true).order('name');
  const { data: rmItems } = await db.from('items').select('id, code, name, uom').eq('type', 'RM').order('code');
  let poLines = existingLines.length ? existingLines.map(l => ({ itemId: String(l.item_id), qty: l.qty, uom: l.uom, rate: l.unit_price, gst: l.gst_percent || 18 })) : [{ itemId: '', qty: 0, uom: 'KG', rate: 0, gst: 18 }];

  function renderPOLines() {
    const el = document.getElementById('po-lines');
    if (!el) return;
    el.innerHTML = poLines.map((line, i) => `
      <div style="display:grid;grid-template-columns:2fr 80px 55px 90px 50px 28px;gap:6px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)">
        <div id="pol-${i}"></div>
        <input type="number" class="form-input" style="padding:5px 8px;font-size:12px" placeholder="Qty" value="${line.qty || ''}" oninput="poLines[${i}].qty=parseFloat(this.value)||0;updatePOTotal()"/>
        <input class="form-input" style="padding:5px 8px;font-size:12px" placeholder="UOM" value="${line.uom || 'KG'}" oninput="poLines[${i}].uom=this.value"/>
        <input type="number" class="form-input" style="padding:5px 8px;font-size:12px" placeholder="Rate ₹" value="${line.rate || ''}" oninput="poLines[${i}].rate=parseFloat(this.value)||0;updatePOTotal()"/>
        <input type="number" class="form-input" style="padding:5px 8px;font-size:12px" placeholder="GST%" value="${line.gst || 18}" oninput="poLines[${i}].gst=parseFloat(this.value)||0"/>
        <button onclick="poLines.splice(${i},1);renderPOLines()" style="background:none;border:none;color:#dc2626;cursor:pointer;font-size:18px" ${poLines.length <= 1 ? 'disabled' : ''}>×</button>
      </div>`).join('');
    poLines.forEach((line, i) => {
      setTimeout(() => {
        ls('pol-' + i, (rmItems || []).map(it => ({ id: String(it.id), label: it.code + ' — ' + it.name, sub: it.uom })), {
          placeholder: 'RM item...', selected: line.itemId || null,
          onSelect: (id, opt) => { poLines[i].itemId = id; if (opt.sub) poLines[i].uom = opt.sub; },
          onAdd: q => lsAddItem(q, 'RM')
        });
      }, 30);
    });
    updatePOTotal();
  }
  window.poLines = poLines;
  window.renderPOLines = renderPOLines;
  window.updatePOTotal = function() {
    let sub = 0; poLines.forEach(l => sub += (l.qty || 0) * (l.rate || 0));
    const gst = poLines.reduce((s, l) => s + (l.qty || 0) * (l.rate || 0) * (l.gst || 18) / 100, 0);
    const el = document.getElementById('po-total');
    if (el) el.innerHTML = `Subtotal ₹${sub.toLocaleString('en-IN')} + GST ₹${Math.round(gst).toLocaleString('en-IN')} = <strong>₹${Math.round(sub + gst).toLocaleString('en-IN')}</strong>`;
  };
  const today = new Date().toISOString().split('T')[0];
  showModal(`<div class="modal" style="max-width:780px">
    <div class="modal-head"><span class="modal-title">${isEdit ? 'Edit' : 'New'} Purchase Order</span><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label class="form-label">PO Number</label><input class="form-input" id="po-no" value="${po?.po_no || 'PO-' + Date.now().toString().slice(-6)}"/></div>
        <div class="form-group"><label class="form-label">Supplier *</label><div id="po-sup-ls"></div></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Order Date</label><input class="form-input" id="po-date" type="date" value="${po?.order_date || today}"/></div>
        <div class="form-group"><label class="form-label">Expected Date</label><input class="form-input" id="po-exp" type="date" value="${po?.expected_date || ''}"/></div>
      </div>
      <div style="margin-bottom:10px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <label class="form-label" style="margin:0">Materials *</label>
          <button class="btn btn-ghost btn-sm" onclick="poLines.push({itemId:'',qty:0,uom:'KG',rate:0,gst:18});renderPOLines()">+ Add Row</button>
        </div>
        <div style="display:grid;grid-template-columns:2fr 80px 55px 90px 50px 28px;gap:6px;padding:0 0 4px">
          <span style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase">Material</span>
          <span style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase">Qty</span>
          <span style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase">UOM</span>
          <span style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase">Rate ₹</span>
          <span style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase">GST%</span>
          <span></span>
        </div>
        <div id="po-lines"></div>
        <div id="po-total" style="margin-top:8px;font-size:13px;text-align:right;padding:6px 10px;background:var(--bg);border-radius:var(--r)"></div>
      </div>
      <div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="po-notes">${po?.notes || ''}</textarea></div>
      <div id="po-err" class="err-msg"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary btn-sm" id="save-po" onclick="savePO('${poId || ''}')">
        ${isEdit ? 'Update' : 'Create'} PO
      </button>
    </div>
  </div>`);
  await new Promise(r => setTimeout(r, 20));
  ls('po-sup-ls', (sups || []).map(s => ({ id: String(s.id), label: s.name })), {
    placeholder: 'Search supplier...', selected: po?.supplier_id ? String(po.supplier_id) : null,
    onAdd: q => lsAddSupplier(q)
  });
  renderPOLines();
}

async function savePO(id) {
  const supId = lsGet('po-sup-ls');
  if (!supId) { document.getElementById('po-err').textContent = 'Select a supplier.'; return; }
  const valid = poLines.filter(l => l.itemId && l.qty > 0);
  if (!valid.length) { document.getElementById('po-err').textContent = 'Add at least 1 material.'; return; }
  const btn = document.getElementById('save-po');
  setBtn(btn, true, id ? 'Updating...' : 'Creating...');
  const sub = valid.reduce((s, l) => s + l.qty * l.rate, 0);
  const gst = valid.reduce((s, l) => s + l.qty * l.rate * l.gst / 100, 0);
  let poId;
  if (id) {
    await db.from('purchase_orders').update({ supplier_id: supId, order_date: document.getElementById('po-date').value, expected_date: document.getElementById('po-exp').value || null, notes: document.getElementById('po-notes').value, total_amount: sub + gst }).eq('id', id);
    await db.from('purchase_order_lines').delete().eq('po_id', id);
    poId = id;
  } else {
    const { data: po, error } = await db.from('purchase_orders').insert({ po_no: document.getElementById('po-no').value, supplier_id: supId, order_date: document.getElementById('po-date').value, expected_date: document.getElementById('po-exp').value || null, notes: document.getElementById('po-notes').value, total_amount: sub + gst, status: 'Ordered' }).select().single();
    if (error) { document.getElementById('po-err').textContent = error.message; setBtn(btn, false, '', 'Create PO'); return; }
    poId = po.id;
  }
  await db.from('purchase_order_lines').insert(valid.map(l => ({ po_id: poId, item_id: parseInt(l.itemId), qty: l.qty, uom: l.uom, unit_price: l.rate, gst_percent: l.gst })));
  closeModal(); showSaved(id ? 'PO Updated!' : 'PO Created!');
}

window.saveGRN = async function(poId, lines) {
  const btn = document.getElementById('save-grn');
  setBtn(btn, true, 'Saving GRN...');
  const date = document.getElementById('grn-date').value;
  const invNo = document.getElementById('grn-inv').value;
  const d = new Date();
  const batchPrefix = d.toISOString().slice(2,10).replace(/-/g,'');
  for (let i = 0; i < lines.length; i++) {
    const qty = parseFloat(document.getElementById('grn-qty-' + i).value) || 0;
    if (qty <= 0) continue;
    const lot = document.getElementById('grn-lot-' + i).value;
    const qc = document.getElementById('grn-qc-' + i).value;
    const batchNo = 'RM-' + batchPrefix + '-' + String(i + 1).padStart(3, '0') + '-' + Date.now().toString().slice(-4);
    // Create RM batch
    await db.from('rm_batches').insert({ batch_no: batchNo, item_id: lines[i].item_id, po_id: poId, supplier_id: lines[i].po?.supplier_id, received_qty: qty, available_qty: qty, uom: lines[i].uom, lot_no: lot, received_date: date, qc_status: qc, location: 'Store', notes: 'GRN: ' + (invNo || poId) });
    // Update inventory
    const { data: inv } = await db.from('inventory').select('id, current_stock').eq('item_id', lines[i].item_id).maybeSingle();
    if (inv) await db.from('inventory').update({ current_stock: (inv.current_stock || 0) + qty, last_updated: new Date().toISOString() }).eq('id', inv.id);
    else await db.from('inventory').insert({ item_id: lines[i].item_id, current_stock: qty, uom: lines[i].uom });
  }
  // Mark PO as Received
  await db.from('purchase_orders').update({ status: 'Received' }).eq('id', poId);
  closeModal(); showSaved('GRN Saved! Stock Updated!');
};

async function showSOModal(soId = null) {
  const isEdit = !!soId;
  let so = null, existingLines = [];
  if (isEdit) {
    const [{ data: s }, { data: l }] = await Promise.all([
      db.from('sales_orders').select('*').eq('id', soId).single(),
      db.from('sales_order_lines').select('*, items(id, code, name)').eq('so_id', soId)

    so = s; existingLines = l || [];
  }
  const { data: custs } = await db.from('customers').select('id, name').eq('is_active', true).order('name');
  const { data: fgItems } = await db.from('items').select('id, code, name').eq('type', 'FG').order('code');
  let soLines = existingLines.length ? existingLines.map(l => ({ itemId: String(l.item_id), qty: l.qty, uom: l.uom, rate: l.unit_price, gst: l.gst_percent || 18 })) : [{ itemId: '', qty: 1, uom: 'SET', rate: 0, gst: 18 }];
  window.soLines = soLines;

  function renderSOLines() {
    const el = document.getElementById('so-lines');
    if (!el) return;
    el.innerHTML = soLines.map((line, i) => `
      <div style="display:grid;grid-template-columns:2fr 70px 55px 90px 50px 28px;gap:6px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)">
        <div id="sol-${i}"></div>
        <input type="number" class="form-input" style="padding:5px 8px;font-size:12px" placeholder="Qty" value="${line.qty || 1}" oninput="soLines[${i}].qty=parseFloat(this.value)||0;updateSOTotal()"/>
        <input class="form-input" style="padding:5px 8px;font-size:12px" placeholder="UOM" value="${line.uom || 'SET'}" oninput="soLines[${i}].uom=this.value"/>
        <input type="number" class="form-input" style="padding:5px 8px;font-size:12px" placeholder="Rate ₹" value="${line.rate || ''}" oninput="soLines[${i}].rate=parseFloat(this.value)||0;updateSOTotal()"/>
        <input type="number" class="form-input" style="padding:5px 8px;font-size:12px" placeholder="GST%" value="${line.gst || 18}" oninput="soLines[${i}].gst=parseFloat(this.value)||0"/>
        <button onclick="soLines.splice(${i},1);renderSOLines()" style="background:none;border:none;color:#dc2626;cursor:pointer;font-size:18px" ${soLines.length <= 1 ? 'disabled' : ''}>×</button>
      </div>`).join('');
    soLines.forEach((line, i) => {
      setTimeout(() => {
        ls('sol-' + i, (fgItems || []).map(it => ({ id: String(it.id), label: it.code + ' — ' + it.name })), {
          placeholder: 'FG item...', selected: line.itemId || null,
          onSelect: id => { soLines[i].itemId = id; },
          onAdd: q => lsAddItem(q, 'FG')
        });
      }, 30);
    });
    updateSOTotal();
  }
  window.renderSOLines = renderSOLines;
  window.updateSOTotal = function() {
    let sub = 0; soLines.forEach(l => sub += (l.qty || 0) * (l.rate || 0));
    const gst = soLines.reduce((s, l) => s + (l.qty || 0) * (l.rate || 0) * (l.gst || 18) / 100, 0);
    const el = document.getElementById('so-total');
    if (el) el.innerHTML = `Subtotal ₹${sub.toLocaleString('en-IN')} + GST ₹${Math.round(gst).toLocaleString('en-IN')} = <strong>₹${Math.round(sub + gst).toLocaleString('en-IN')}</strong>`;
  };
  const today = new Date().toISOString().split('T')[0];
  showModal(`<div class="modal" style="max-width:780px">
    <div class="modal-head"><span class="modal-title">${isEdit ? 'Edit' : 'New'} Sales Order</span><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label class="form-label">SO Number</label><input class="form-input" id="so-no" value="${so?.so_no || 'SO-' + Date.now().toString().slice(-6)}"/></div>
        <div class="form-group"><label class="form-label">Customer *</label><div id="so-cust-ls"></div></div>

      </div>
      <div style="margin-bottom:10px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <label class="form-label" style="margin:0">Items *</label>
          <button class="btn btn-ghost btn-sm" onclick="soLines.push({itemId:'',qty:1,uom:'SET',rate:0,gst:18});renderSOLines()">+ Add Row</button>
        </div>
        <div style="display:grid;grid-template-columns:2fr 70px 55px 90px 50px 28px;gap:6px;padding:0 0 4px">
          <span style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase">Item</span>
          <span style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase">Qty</span>
          <span style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase">UOM</span>
          <span style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase">Rate ₹</span>
          <span style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase">GST%</span>
          <span></span>
        </div>
        <div id="so-lines"></div>
        <div id="so-total" style="margin-top:8px;font-size:13px;text-align:right;padding:6px 10px;background:var(--bg);border-radius:var(--r)"></div>

      <div id="so-err" class="err-msg"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary btn-sm" id="save-so" onclick="saveSO('${soId || ''}')">
        ${isEdit ? 'Update' : 'Create'} SO
      </button>
    </div>
  </div>`);
  await new Promise(r => setTimeout(r, 20));
  ls('so-cust-ls', (custs || []).map(c => ({ id: String(c.id), label: c.name })), {
    placeholder: 'Search customer...', selected: so?.customer_id ? String(so.customer_id) : null,
    onAdd: q => lsAddCustomer(q)
  });
  renderSOLines();
}

async function saveSO(id) {
  const custId = lsGet('so-cust-ls');
  if (!custId) { document.getElementById('so-err').textContent = 'Select a customer.'; return; }
  const valid = soLines.filter(l => l.itemId && l.qty > 0);
  if (!valid.length) { document.getElementById('so-err').textContent = 'Add at least 1 item.'; return; }
  const btn = document.getElementById('save-so');
  setBtn(btn, true, id ? 'Updating...' : 'Creating...');
  const sub = valid.reduce((s, l) => s + l.qty * l.rate, 0);
  const gst = valid.reduce((s, l) => s + l.qty * l.rate * l.gst / 100, 0);
  let soId;
  if (id) {
    await db.from('sales_orders').update({ customer_id: custId, order_date: document.getElementById('so-date').value, delivery_date: document.getElementById('so-del').value || null, notes: document.getElementById('so-notes').value, total_amount: sub + gst }).eq('id', id);
    await db.from('sales_order_lines').delete().eq('so_id', id);
    soId = id;
  } else {
    const { data: s, error } = await db.from('sales_orders').insert({ so_no: document.getElementById('so-no').value, customer_id: custId, order_date: document.getElementById('so-date').value, delivery_date: document.getElementById('so-del').value || null, notes: document.getElementById('so-notes').value, total_amount: sub + gst, status: 'Confirmed' }).select().single();
    if (error) { document.getElementById('so-err').textContent = error.message; setBtn(btn, false, '', 'Create SO'); return; }
    soId = s.id;
  }
  await db.from('sales_order_lines').insert(valid.map(l => ({ so_id: soId, item_id: parseInt(l.itemId), qty: l.qty, uom: l.uom, unit_price: l.rate, gst_percent: l.gst, total_amount: l.qty * l.rate * (1 + l.gst / 100) })));
  closeModal(); showSaved(id ? 'SO Updated!' : 'SO Created!');
}

      <td><span class="badge ${p.is_active ? 'badge-ok' : 'badge-secondary'}">${p.is_active ? 'Active' : 'Inactive'}</span></td>
      <td><div class="action-btns">
        <button class="btn btn-ghost btn-sm" onclick='showPartyModal("${table}",${JSON.stringify(p)})'>Edit</button>
        <button class="btn btn-danger btn-sm" onclick="delConfirm('${table}','${p.id}','${p.name}')">Del</button>
      </div></td>
    </tr>`).join('') || '<tr class="empty-row"><td colspan="6">None yet</td></tr>'}</tbody>
    </table></div>`;
}
window.showPartyModal = function(table, p = null) {
  const title = table === 'suppliers' ? 'Supplier' : 'Customer';
  showModal(`<div class="modal">
    <div class="modal-head"><span class="modal-title">${p ? 'Edit' : 'New'} ${title}</span><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label class="form-label">Code *</label><input class="form-input" id="p-code" value="${p?.code || ''}"/></div>
        <div class="form-group"><label class="form-label">Name *</label><input class="form-input" id="p-name" value="${p?.name || ''}"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">GSTIN</label><input class="form-input" id="p-gstin" value="${p?.gstin || ''}"/></div>
        <div class="form-group"><label class="form-label">Phone</label><input class="form-input" id="p-phone" value="${p?.phone || ''}"/></div>
      </div>
      <div class="form-group"><label class="form-label">Address</label><textarea class="form-textarea" id="p-addr">${p?.address || ''}</textarea></div>
      <div id="p-err" class="err-msg"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary btn-sm" id="save-p" onclick="saveParty('${table}','${p?.id || ''}')">
        ${p ? 'Update' : 'Create'} ${title}
      </button>
    </div>
  </div>`);
};
window.saveParty = async function(table, id) {
  const payload = { code: document.getElementById('p-code').value.trim().toUpperCase(), name: document.getElementById('p-name').value.trim(), gstin: document.getElementById('p-gstin').value.trim() || null, phone: document.getElementById('p-phone').value.trim() || null, address: document.getElementById('p-addr').value || null, is_active: true };
  if (!payload.code || !payload.name) { document.getElementById('p-err').textContent = 'Code and name required.'; return; }
  const btn = document.getElementById('save-p');
  setBtn(btn, true);
  const { error } = id ? await db.from(table).update(payload).eq('id', id) : await db.from(table).insert(payload);
  if (error) { document.getElementById('p-err').textContent = error.message; setBtn(btn, false, '', 'Save'); return; }
  closeModal(); showSaved('Saved!');
};
async function pgDispatch(el, tb) {
  const { data: sos } = await db.from('sales_orders').select('*, customers(name), sales_order_lines(qty, uom, items(code, name))').eq('status', 'Confirmed').order('delivery_date');
  el.innerHTML = `<div class="table-wrap">
    <div class="table-head"><span class="table-title">Ready to Dispatch</span></div>
    <table><thead><tr><th>SO No</th><th>Customer</th><th>Items</th><th>Delivery</th><th>Action</th></tr></thead>
    <tbody>${(sos || []).length ? sos.map(s => `<tr>
      <td class="mono" style="font-weight:600">${s.so_no}</td>
      <td>${s.customers?.name || '—'}</td>
      <td>${(s.sales_order_lines || []).map(l => l.items?.code + ' × ' + l.qty).join(', ')}</td>
      <td>${s.delivery_date ? new Date(s.delivery_date).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' }) : '—'}</td>
      <td><button class="btn btn-primary btn-sm" onclick="dispatchSO('${s.id}','${s.so_no}')">🚚 Dispatch</button></td>
    </tr>`).join('') : '<tr class="empty-row"><td colspan="5">No orders ready to dispatch</td></tr>'}</tbody>
    </table></div>`;
}
window.dispatchSO = async function(id, no) {
  if (!confirm('Dispatch ' + no + '?')) return;
  await db.from('sales_orders').update({ status: 'Dispatched', dispatched_at: new Date().toISOString() }).eq('id', id);
  showSaved('Dispatched!'); nav('dispatch');
};

// ══ BOOT ══
async function boot() {
  const { data: { session } } = await db.auth.getSession();
  if (session) {
    user = session.user;
    try { const { data: p } = await db.from('user_profiles').select('*').eq('user_id', user.id).single(); profile = p; } catch(e) {}
    page = 'dashboard'; render(); loadPage();
  } else render();
}

boot();
</script>
</body>
</html>
