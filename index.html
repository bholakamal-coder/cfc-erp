<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>

<style>
:root{
  --red:#e31e24;--red-d:#b91c1c;--red-l:#fef2f2;--red-l2:#fee2e2;
  --green:#16a34a;--green-l:#f0fdf4;
  --amber:#d97706;--amber-l:#fffbeb;
  --blue:#2563eb;--blue-l:#eff6ff;
  --purple:#7c3aed;--purple-l:#f5f3ff;
  --bg:#f1f5f9;--white:#fff;
  --border:#e2e8f0;--border-d:#cbd5e1;
  --text:#1e293b;--text2:#475569;--text3:#94a3b8;
  --topbar:56px;--sidebar:232px;
  --r:6px;--r-lg:10px;
  --sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --sh-md:0 4px 12px rgba(0,0,0,.08);
  --sh-lg:0 10px 24px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;}

/* TOPBAR */
.topbar{position:fixed;top:0;left:0;right:0;height:var(--topbar);background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:0;z-index:100;box-shadow:var(--sh);}
.topbar-brand{width:var(--sidebar);display:flex;align-items:center;padding:0 16px;border-right:1px solid var(--border);height:100%;flex-shrink:0;}
.topbar-logo-img{height:38px;object-fit:contain;max-width:180px;}
.topbar-center{flex:1;padding:0 20px;}
.topbar-search-box{position:relative;max-width:440px;}
.topbar-search-input{width:100%;background:#f8fafc;border:1px solid var(--border);border-radius:20px;padding:7px 14px 7px 36px;font-family:inherit;font-size:13px;color:var(--text);outline:none;transition:all .2s;}
.topbar-search-input:focus{border-color:var(--red);background:#fff;box-shadow:0 0 0 3px rgba(227,30,36,.08);}
.topbar-right{display:flex;align-items:center;gap:4px;padding:0 16px;}
.topbar-link{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:var(--r);color:var(--text2);text-decoration:none;background:transparent;border:none;cursor:pointer;transition:all .15s;font-size:15px;}
.topbar-link:hover{background:#f1f5f9;color:var(--red);}
.topbar-divider{width:1px;height:20px;background:var(--border);margin:0 4px;}
.user-chip{display:flex;align-items:center;gap:8px;padding:4px 10px;border-radius:20px;cursor:pointer;transition:all .15s;}
.user-chip:hover{background:#f8fafc;}
.user-avatar-sm{width:28px;height:28px;border-radius:50%;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.user-name-sm{font-size:13px;font-weight:500;color:var(--text2);}

/* SIDEBAR */
.sidebar{position:fixed;top:var(--topbar);left:0;bottom:0;width:var(--sidebar);background:var(--white);border-right:1px solid var(--border);overflow-y:auto;z-index:50;display:flex;flex-direction:column;}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border-d);border-radius:2px;}
.sb-section-label{padding:16px 16px 4px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.09em;}
.sidebar-item{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:var(--r);margin:1px 8px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:400;transition:all .12s;border:none;background:transparent;width:calc(100% - 16px);text-align:left;}
.sidebar-item:hover{background:#f8fafc;color:var(--text);}
.sidebar-item.active{background:var(--red-l);color:var(--red);font-weight:600;}
.si-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0;}
.si-label{font-size:13px;}
.sb-tools{margin-top:auto;padding:8px;border-top:1px solid var(--border);}
.sb-tool-link{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--r);color:var(--text2);font-size:12px;font-weight:500;text-decoration:none;transition:all .15s;}
.sb-tool-link:hover{background:var(--red-l);color:var(--red);}

/* MAIN */
.main-content{margin-left:var(--sidebar);margin-top:var(--topbar);min-height:calc(100vh - var(--topbar));}
.page-actions-bar{background:var(--white);border-bottom:1px solid var(--border);padding:10px 24px;min-height:0;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.page-actions-bar:empty{display:none;}
.page-body{padding:20px 24px;}

/* LOGIN */
.login-page{display:flex;min-height:100vh;}
.login-left{width:420px;background:var(--red);padding:48px;display:flex;flex-direction:column;justify-content:center;flex-shrink:0;}
.login-logo{height:60px;object-fit:contain;margin-bottom:24px;filter:brightness(0) invert(1);}
.login-brand{font-size:28px;font-weight:700;color:#fff;margin-bottom:8px;}
.login-tagline{font-size:14px;color:rgba(255,255,255,.8);margin-bottom:32px;line-height:1.6;}
.login-features{display:flex;flex-direction:column;gap:10px;}
.lf-item{color:rgba(255,255,255,.9);font-size:14px;font-weight:500;}
.login-right{flex:1;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:48px;}
.login-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:36px;width:100%;max-width:400px;box-shadow:var(--sh-lg);}
.login-card-title{font-size:22px;font-weight:700;color:var(--text);margin-bottom:4px;}
.login-card-sub{font-size:13px;color:var(--text2);}

/* CARDS */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:16px;}
.card-header{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:14px;font-weight:600;color:var(--text);}
.card-body{padding:16px 18px;}

/* STAT CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:20px;}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--sh);position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.stat-card.red::before{background:var(--red);}
.stat-card.green::before{background:var(--green);}
.stat-card.amber::before{background:var(--amber);}
.stat-card.blue::before{background:var(--blue);}
.stat-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;}
.stat-value{font-size:24px;font-weight:700;color:var(--text);font-family:'DM Mono',monospace;}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px;}

/* TABLES */
.table-wrap{background:var(--white);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:16px;}
.table-header{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;background:#fafafa;}
.table-title{font-size:14px;font-weight:600;color:var(--text);}
table{width:100%;border-collapse:collapse;}
thead{background:#f8fafc;}
th{padding:9px 14px;text-align:left;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:9px 14px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tbody tr:hover{background:#fafafa;}
.empty-row td{text-align:center;color:var(--text3);padding:32px;font-style:italic;}

/* BUTTONS */
.btn{padding:7px 14px;border-radius:var(--r);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.btn-primary{background:var(--red);color:#fff;border-color:var(--red);}
.btn-primary:hover{background:var(--red-d);border-color:var(--red-d);}
.btn-secondary,.btn-ghost{background:#fff;color:var(--text);border-color:var(--border);}
.btn-secondary:hover,.btn-ghost:hover{background:#f8fafc;}
.btn-success{background:var(--green);color:#fff;border-color:var(--green);}
.btn-danger{background:#dc2626;color:#fff;border-color:#dc2626;}
.btn-warning{background:var(--amber);color:#fff;border-color:var(--amber);}
.btn-sm{padding:4px 10px;font-size:12px;}
.btn-xs{padding:2px 8px;font-size:11px;}
.btn:disabled{opacity:.5;cursor:not-allowed;}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-success,.badge-ok,.badge-pass{background:#dcfce7;color:#166534;}
.badge-danger,.badge-red,.badge-fail,.badge-cancel{background:#fee2e2;color:#991b1b;}
.badge-warning,.badge-warn{background:#fef3c7;color:#92400e;}
.badge-info,.badge-mto{background:#dbeafe;color:#1e40af;}
.badge-secondary{background:#f1f5f9;color:#475569;}
.badge-primary,.badge-rm{background:var(--red-l2);color:var(--red-d);}
.badge-mts{background:#fef3c7;color:#92400e;}
.badge-sfg{background:#ede9fe;color:#6d28d9;}
.badge-fg{background:#dcfce7;color:#166534;}

/* FORMS */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:0;}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.form-group{display:flex;flex-direction:column;gap:4px;margin-bottom:14px;}
.form-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;}
.form-input,.form-select{width:100%;background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;font-family:inherit;font-size:13px;color:var(--text);outline:none;transition:border .15s;}
.form-input:focus,.form-select:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(227,30,36,.08);}
.form-input::placeholder{color:var(--text3);}
.form-textarea{width:100%;background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;font-family:inherit;font-size:13px;color:var(--text);outline:none;min-height:70px;resize:vertical;}
.err-msg{color:#dc2626;font-size:12px;margin-top:4px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(3px);}
.modal{background:#fff;border-radius:var(--r-lg);width:100%;max-width:640px;max-height:92vh;overflow-y:auto;box-shadow:var(--sh-lg);}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1;}
.modal-title{font-size:16px;font-weight:700;color:var(--text);}
.modal-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:22px;line-height:1;padding:2px;border-radius:4px;transition:all .15s;}
.modal-close:hover{background:#f1f5f9;color:var(--text);}
.modal-body{padding:20px;}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;background:#f8fafc;border-radius:0 0 var(--r-lg) var(--r-lg);}

/* GLOBAL SMART SELECT */
.gss-wrap{position:relative;width:100%;}
.gss-display{width:100%;background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;color:var(--text);font-family:inherit;font-size:13px;outline:none;cursor:pointer;text-align:left;display:flex;align-items:center;justify-content:space-between;transition:all .15s;}
.gss-display:focus,.gss-display.open{border-color:var(--red);box-shadow:0 0 0 3px rgba(227,30,36,.08);}
.gss-display-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.gss-arrow{color:var(--text3);font-size:10px;margin-left:6px;}
.gss-dropdown{position:absolute;top:calc(100% + 3px);left:0;right:0;background:#fff;border:1px solid var(--red);border-radius:var(--r);z-index:9999;max-height:260px;overflow:hidden;display:none;box-shadow:var(--sh-lg);flex-direction:column;}
.gss-dropdown.open{display:flex;}
.gss-search-wrap{padding:8px;border-bottom:1px solid var(--border);}
.gss-search{width:100%;background:#f8fafc;border:1px solid var(--border);border-radius:4px;padding:7px 10px;font-family:inherit;font-size:13px;color:var(--text);outline:none;}
.gss-search:focus{border-color:var(--red);}
.gss-list{overflow-y:auto;max-height:180px;}
.gss-opt{padding:9px 14px;cursor:pointer;font-size:13px;color:var(--text);transition:background .1s;}
.gss-opt:hover{background:#f8fafc;}
.gss-opt.active{background:var(--red-l);color:var(--red);font-weight:500;}
.gss-empty{padding:12px 14px;font-size:12px;color:var(--text3);text-align:center;}
.gss-add{padding:9px 14px;cursor:pointer;font-size:13px;color:var(--green);border-top:1px solid var(--border);font-weight:600;display:flex;align-items:center;gap:6px;}
.gss-add:hover{background:var(--green-l);}

/* LEGACY SMART SELECT */
.smart-select-wrap{position:relative;width:100%;}
.smart-select-input{width:100%;background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;font-family:inherit;font-size:13px;color:var(--text);outline:none;cursor:pointer;}
.smart-select-input:focus{border-color:var(--red);}
.smart-select-dropdown{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--border);border-radius:var(--r);z-index:999;max-height:240px;overflow-y:auto;display:none;box-shadow:var(--sh-lg);}
.smart-select-dropdown.open{display:block;}
.smart-select-search{width:100%;background:#f8fafc;border:none;border-bottom:1px solid var(--border);padding:8px 12px;font-family:inherit;font-size:13px;outline:none;}
.smart-select-option{padding:9px 14px;cursor:pointer;font-size:13px;color:var(--text);}
.smart-select-option:hover,.smart-select-option.selected{background:#f8fafc;color:var(--red);}
.smart-select-add{padding:9px 14px;cursor:pointer;font-size:13px;color:var(--green);border-top:1px solid var(--border);font-weight:500;}
.smart-select-empty{padding:12px;font-size:12px;color:var(--text3);text-align:center;}

/* BOM TREE */
.bom-tree{background:#f8fafc;border:1px solid var(--border);border-radius:var(--r);padding:12px;}
.bom-node{display:flex;align-items:center;gap:8px;padding:5px 0;}
.bom-indent{width:20px;height:1px;background:var(--border-d);flex-shrink:0;}
.bom-dot{width:7px;height:7px;border-radius:50%;background:var(--red);flex-shrink:0;}
.bom-item-qty{font-size:12px;color:var(--text2);margin-left:auto;font-family:'DM Mono',monospace;}

/* MISC */
.action-btns{display:flex;gap:4px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.loader{display:flex;align-items:center;justify-content:center;padding:40px;gap:10px;color:var(--text3);}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes popIn{from{opacity:0;transform:translate(-50%,-50%) scale(.8)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
#cfc-toast{display:none;position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:12px 18px;border-radius:var(--r);font-size:13px;font-weight:500;z-index:9999;box-shadow:var(--sh-lg);border-left:4px solid var(--red);max-width:300px;}

/* PAGE HEADER */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.page-title{font-size:20px;font-weight:700;color:var(--text);}
.page-subtitle{font-size:13px;color:var(--text2);margin-top:2px;}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{width:56px;}
  .si-label,.sb-section-label,.sb-tools,.user-name-sm{display:none;}
  .main-content{margin-left:56px;}
  .form-row,.form-row-3,.grid2{grid-template-columns:1fr;}
  .topbar-center{display:none;}
  .login-left{display:none;}
}
</style>

<script>
const SURL='https://hfufhcsvbrzygoykvtah.supabase.co';
const SKEY='sb_publishable_iqs1Q7TrS4j28CWqv3TUJQ_57WHtgB9';
const {createClient}=supabase;
const db=createClient(SURL,SKEY);
let page='dashboard',user=null,profile=null,modal=null;

// ── CORE NAVIGATION ──
function nav(p){
  page=p;
  modal=null;
  const mr=document.getElementById('modal-root');
  if(mr) mr.innerHTML='';
  const pc=document.getElementById('page-content');

      el.classList.toggle('active',oc.includes("'"+p+"'"));

    pc.innerHTML='<div class="loader"><div class="spinner"></div> Loading...</div>';
    loadPage();
  } else {
    render();
  }
}

// Make nav globally accessible
window.nav = nav;


// ── SMART SEARCHABLE SELECT ──
// Usage: smartSelect(containerId, options, selectedId, onSelect, onAddNew)
// options = [{id, label}]
function smartSelect(containerId, options, selectedId, onSelect, onAddNew){
  const wrap=document.getElementById(containerId);
  if(!wrap) return;
  const selected=options.find(o=>o.id==selectedId);
  wrap.innerHTML=`
    <div class="smart-select-wrap" id="ssw-${containerId}">
      <input class="smart-select-input" id="ssi-${containerId}" 
        placeholder="Search or select..." 
        value="${selected?.label||''}" 
        readonly
        onclick="toggleSmartSelect('${containerId}')"/>
      <div class="smart-select-dropdown" id="ssd-${containerId}">
        <input class="smart-select-search" id="sss-${containerId}" 
          placeholder="Type to search..." 
          oninput="filterSmartSelect('${containerId}')"
          onclick="event.stopPropagation()"/>
        <div id="sslist-${containerId}"></div>
        ${onAddNew?`<div class="smart-select-add" onclick="handleSmartAddNew('${containerId}')">+ Add New</div>`:''}
      </div>
    </div>`;
  
  // Store data on element
  wrap._ssData={options,selectedId,onSelect,onAddNew};
  renderSmartOptions(containerId, options, selectedId, onSelect);
  
  // Close on outside click
  document.addEventListener('click', function closeDD(e){
    const dd=document.getElementById('ssd-'+containerId);
    const inp=document.getElementById('ssi-'+containerId);
    if(dd&&inp&&!dd.contains(e.target)&&e.target!==inp){
      dd.classList.remove('open');
      document.removeEventListener('click',closeDD);
    }
  });
}

function toggleSmartSelect(id){
  const dd=document.getElementById('ssd-'+id);
  const search=document.getElementById('sss-'+id);
  if(!dd) return;
  dd.classList.toggle('open');
  if(dd.classList.contains('open')&&search){
    search.value='';
    filterSmartSelect(id);
    setTimeout(()=>search.focus(),50);
  }
}

function filterSmartSelect(id){
  const wrap=document.getElementById(id);
  if(!wrap||!wrap._ssData) return;
  const q=document.getElementById('sss-'+id)?.value?.toLowerCase()||'';
  const filtered=wrap._ssData.options.filter(o=>o.label.toLowerCase().includes(q));
  renderSmartOptions(id, filtered, wrap._ssData.selectedId, wrap._ssData.onSelect);
}

function renderSmartOptions(id, options, selectedId, onSelect){
  const list=document.getElementById('sslist-'+id);
  if(!list) return;
  if(!options.length){
    list.innerHTML='<div class="smart-select-empty">Koi result nahi</div>';
    return;
  }
  list.innerHTML=options.map(o=>`
    <div class="smart-select-option ${o.id==selectedId?'selected':''}" 
      onclick="selectSmartOption('${id}','${o.id}',${JSON.stringify(o.label).replace(/"/g,'&quot;')})">
      ${o.label}
    </div>`).join('');
}

function selectSmartOption(id, optId, label){
  const wrap=document.getElementById(id);
  if(!wrap) return;
  wrap._ssData.selectedId=optId;
  document.getElementById('ssi-'+id).value=label;
  document.getElementById('ssd-'+id)?.classList.remove('open');
  if(wrap._ssData.onSelect) wrap._ssData.onSelect(optId, label);
}

function handleSmartAddNew(id){
  const wrap=document.getElementById(id);
  document.getElementById('ssd-'+id)?.classList.remove('open');
  if(wrap?._ssData?.onAddNew) wrap._ssData.onAddNew(id);
}

// Quick add customer inline
async function quickAddCustomer(targetSelectId){
  const name=prompt('Customer ka naam daalo:');
  if(!name?.trim()) return;
  const gstin=prompt('GSTIN (optional, Enter skip karo):');
  const phone=prompt('Phone (optional):');
  const code='CUS-'+Date.now().toString().slice(-6);
  const{data,error}=await db.from('customers').insert({code,name:name.trim(),gstin:gstin||null,phone:phone||null,is_active:true}).select().single();
  if(error){alert('Error: '+error.message);return;}
  // Refresh the dropdown if smartSelect
  const wrap=document.getElementById(targetSelectId);
  if(wrap?._ssData){
    wrap._ssData.options.push({id:data.id,label:data.name});
    selectSmartOption(targetSelectId,data.id,data.name);
  }
  showToast('✓ Customer added: '+data.name);
}

// Quick add supplier inline  
async function quickAddSupplier(targetSelectId){
  const name=prompt('Supplier ka naam daalo:');
  if(!name?.trim()) return;
  const gstin=prompt('GSTIN (optional):');
  const phone=prompt('Phone (optional):');
  const code='SUP-'+Date.now().toString().slice(-6);
  const{data,error}=await db.from('suppliers').insert({code,name:name.trim(),gstin:gstin||null,phone:phone||null,is_active:true}).select().single();
  if(error){alert('Error: '+error.message);return;}
  const wrap=document.getElementById(targetSelectId);
  if(wrap?._ssData){
    wrap._ssData.options.push({id:data.id,label:data.name});
    selectSmartOption(targetSelectId,data.id,data.name);
  }
  showToast('✓ Supplier added: '+data.name);
}

// GLOBAL SMART SELECT — har jagah use karo
// ══════════════════════════════════════════
/*
  Usage:
  gss('container-id', options, {
    placeholder: 'Search...',
    onSelect: (id, label) => {},
    onAdd: (query) => {},   // optional — "Add New" button
    selected: 'current-id' // optional
  })
  options = [{id, label, sub}]  sub = small grey text
*/
function gss(containerId, options, cfg={}){
  const wrap = document.getElementById(containerId);
  if(!wrap) return;
  
  let selectedId = cfg.selected||null;
  let selectedLabel = options.find(o=>o.id==selectedId)?.label || '';
  
  wrap._gssData = {options, cfg, selectedId};
  
  wrap.innerHTML = `
    <div class="gss-wrap">
      <button type="button" class="gss-display" id="gssd-${containerId}" onclick="gssToggle('${containerId}')">
        <span class="gss-display-text" id="gsst-${containerId}">${selectedLabel||`<span style="color:var(--text3)">${cfg.placeholder||'Search or select...'}</span>`}</span>
        <span class="gss-arrow">▼</span>
      </button>
      <div class="gss-dropdown" id="gssdd-${containerId}">
        <div class="gss-search-wrap">
          <input class="gss-search" id="gsssearch-${containerId}" 
            placeholder="Type to search..." 
            oninput="gssFilter('${containerId}')"
            onclick="event.stopPropagation()"/>
        </div>
        <div class="gss-list" id="gsslist-${containerId}"></div>
        ${cfg.onAdd?`<div class="gss-add" onclick="gssAddNew('${containerId}')">+ Add New</div>`:''}
      </div>
    </div>`;
  
  gssRenderList(containerId, options, selectedId);
  
  // Close on outside click
  setTimeout(()=>{
    document.addEventListener('click', function gssClose(e){
      const dd = document.getElementById('gssdd-'+containerId);
      const btn = document.getElementById('gssd-'+containerId);
      if(dd && btn && !dd.contains(e.target) && !btn.contains(e.target)){
        dd.classList.remove('open');
        btn.classList.remove('open');
        document.removeEventListener('click', gssClose);
      }
    });
  }, 0);
}

function gssToggle(id){
  const dd = document.getElementById('gssdd-'+id);
  const btn = document.getElementById('gssd-'+id);
  const isOpen = dd.classList.contains('open');
  
  // Close all other dropdowns first
  document.querySelectorAll('.gss-dropdown.open').forEach(d=>{
    d.classList.remove('open');
    d.previousElementSibling?.classList.remove('open');
  });
  
  if(!isOpen){
    dd.classList.add('open');
    btn.classList.add('open');
    const search = document.getElementById('gsssearch-'+id);
    if(search){ search.value=''; search.focus(); gssFilter(id); }
  }
}

function gssFilter(id){
  const wrap = document.getElementById(id);
  if(!wrap?._gssData) return;
  const q = document.getElementById('gsssearch-'+id)?.value?.toLowerCase()||'';
  const filtered = wrap._gssData.options.filter(o=>
    o.label.toLowerCase().includes(q) || (o.sub||'').toLowerCase().includes(q)
  );
  gssRenderList(id, filtered, wrap._gssData.selectedId);
}

function gssRenderList(id, options, selectedId){
  const list = document.getElementById('gsslist-'+id);
  if(!list) return;
  if(!options.length){
    list.innerHTML='<div class="gss-empty">Koi result nahi mila</div>';
    return;
  }
  list.innerHTML = options.slice(0,50).map(o=>`
    <div class="gss-opt ${o.id==selectedId?'active':''}" onclick="gssSelect('${id}','${o.id}',${JSON.stringify(o.label)})">
      ${o.label}${o.sub?`<span style="font-size:11px;color:var(--text3);margin-left:6px">${o.sub}</span>`:''}
    </div>`).join('');
}

function gssSelect(id, optId, label){
  const wrap = document.getElementById(id);
  if(!wrap?._gssData) return;
  wrap._gssData.selectedId = optId;
  document.getElementById('gsst-'+id).innerHTML = label;
  document.getElementById('gssdd-'+id)?.classList.remove('open');
  document.getElementById('gssd-'+id)?.classList.remove('open');
  if(wrap._gssData.cfg?.onSelect) wrap._gssData.cfg.onSelect(optId, label);
}

function gssGet(id){
  return document.getElementById(id)?._gssData?.selectedId || null;
}

async function gssAddNew(id){
  const wrap = document.getElementById(id);
  const cfg = wrap?._gssData?.cfg;
  document.getElementById('gssdd-'+id)?.classList.remove('open');
  if(cfg?.onAdd){
    const query = document.getElementById('gsssearch-'+id)?.value || '';
    const result = await cfg.onAdd(query);
    if(result){
      // Add to options and select
      wrap._gssData.options.unshift(result);
      gssSelect(id, result.id, result.label);
    }
  }
}

function setBtnState(btn,loading,loadText='Saving...',orig=null){
  if(!btn) return;
  if(loading){btn._orig=orig||btn.textContent;btn.disabled=true;btn.innerHTML='<span style="display:flex;align-items:center;gap:5px"><span style="width:11px;height:11px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;display:inline-block;animation:spin .6s linear infinite"></span>'+loadText+'</span>';btn.style.opacity='.8';}
  else{btn.disabled=false;btn.textContent=btn._orig||orig||'Save';btn.style.opacity='1';}
}
function showSavedPopup(msg='✓ Saved!'){
  const p=document.createElement('div');
  p.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.8);background:var(--bg2);border:1px solid var(--green);border-radius:12px;padding:18px 28px;font-size:15px;font-weight:600;color:var(--green);z-index:9999;box-shadow:0 8px 40px rgba(0,0,0,.6);display:flex;align-items:center;gap:10px;animation:popIn .2s ease forwards';
  p.innerHTML='<span style="font-size:22px">✅</span><span>'+msg+'</span>';
  const s=document.createElement('style');s.textContent='@keyframes popIn{from{opacity:0;transform:translate(-50%,-50%) scale(.8)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}';
  document.head.appendChild(s);document.body.appendChild(p);
  setTimeout(()=>{p.style.animation='popIn .2s ease reverse';setTimeout(()=>p.remove(),200);},1500);
}
function showToast(msg){
  let t=document.getElementById('cfc-toast');
  if(!t){t=document.createElement('div');t.id='cfc-toast';t.style.cssText='position:fixed;bottom:20px;right:20px;background:#10b981;color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:9999;display:none';document.body.appendChild(t);}
  t.textContent=msg;t.style.display='block';
  clearTimeout(t._timer);t._timer=setTimeout(()=>t.style.display='none',3000);
}

  document.getElementById('login-btn')?.addEventListener('click',doLogin);
  document.getElementById('show-signup')?.addEventListener('click',showSignup);
}

async function doLogin(){
  const email=document.getElementById('l-email').value;
  const pass=document.getElementById('l-pass').value;
  const err=document.getElementById('login-err');
  err.textContent='';
  const{data,error}=await db.auth.signInWithPassword({email,password:pass});
  if(error){err.textContent=error.message;return;}
  user=data.user;await loadProfile();page='dashboard';render();loadPage();
}

function showSignup(){
  modal=`<div class="modal-overlay"><div class="modal">
    <div class="modal-head"><span class="modal-title">Create Account</span><button class="modal-close" id="cm">×</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Full Name</label><input class="form-input" id="s-name"/></div>
      <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="s-email" type="email"/></div>
      <div class="form-group"><label class="form-label">Password</label><input class="form-input" id="s-pass" type="password"/></div>
      <div class="form-group"><label class="form-label">Role</label>
        <select class="form-select" id="s-role">
          <option value="admin">Admin</option><option value="production">Production</option>
          <option value="qc">QC</option><option value="packing">Packing</option>
          <option value="store">Store</option><option value="accounts">Accounts</option>
        </select>
      </div>
      <div id="s-err" class="err-msg"></div>
    </div>
    <div class="modal-footer"><button class="btn btn-primary btn-sm" id="do-signup">Create Account</button></div>
  </div></div>`;
  render();
  document.getElementById('cm').addEventListener('click',closeModal);
  document.getElementById('do-signup').addEventListener('click',async()=>{
    const{data,error}=await db.auth.signUp({email:document.getElementById('s-email').value,password:document.getElementById('s-pass').value});
    if(error){document.getElementById('s-err').textContent=error.message;return;}
    if(data.user)await db.from('user_profiles').insert({id:data.user.id,full_name:document.getElementById('s-name').value,role:document.getElementById('s-role').value});
    document.getElementById('s-err').style.color='var(--green)';
    document.getElementById('s-err').textContent='Account created! Please sign in.';
  });
}

async function loadProfile(){
  if(!user)return;
  const{data}=await db.from('user_profiles').select('*').eq('id',user.id).single();
  profile=data;
}

function closeModal(){modal=null;render();loadPage();}

async function loadPage(){
  const el=document.getElementById('page-content');
  const acts=document.getElementById('topbar-actions');
  if(!el)return;
  el.innerHTML='<div class="loader"><div class="spinner"></div> Loading...</div>';
  if(acts)acts.innerHTML='';
  const pages={
    dashboard:loadDashboard,items:loadItems,bom:loadBOM,
    machines:loadMachines,production:loadProduction,
    planning:loadPlanning,inventory:loadInventory,
    qc:loadQC,packing:loadPacking,purchase:loadPurchase,
    sales:loadSales,suppliers:loadSuppliers,customers:loadCustomers,
    'daily-planning':loadPlanning
  };
  if(pages[page]) await pages[page](el,acts);
  else el.innerHTML='<p style="color:#94a3b8;padding:40px;text-align:center">Coming soon</p>';
}

// ── HELPERS ──
function sc(s){return{Draft:'draft',Planned:'planned','In Progress':'inprog',Completed:'done',Cancelled:'cancel',Stacked:'planned',Packed:'done',Pass:'pass',Fail:'fail',Hold:'hold'}[s]||'draft';}
function greeting(){const h=new Date().getHours();return h<12?'Morning':h<17?'Afternoon':'Evening';}
function flowRow(t,s){return`<div style="display:flex;gap:10px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)"><div style="width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0"></div><div><div style="font-size:13px;font-weight:500">${t}</div><div style="font-size:11px;color:var(--text3)">${s}</div></div></div>`;}

// ── ITEMS ──
async function loadItems(el,acts){
  if(acts)acts.innerHTML=`<button class="btn btn-primary btn-sm" id="add-item-btn">+ Add Item</button>`;
  const{data:items}=await db.from('items').select('*,item_categories(name)').order('code');
  renderItemsTable(el,items||[]);
  document.getElementById('add-item-btn')?.addEventListener('click',()=>showItemModal(null,items||[]));
}

function renderItemsTable(el,items){
  el.innerHTML=`<div class="table-wrap">
    <div class="table-header"><span class="table-title">All Items (${items.length})</span><input class="search-input" id="item-search" placeholder="Search items..."/></div>
    <table id="items-tbl">
      <thead><tr><th>Code</th><th>Name</th><th>Type</th><th>Category</th><th>UOM</th><th>Reorder</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>${itemRows(items)}</tbody>
    </table>
  </div>`;
  document.getElementById('item-search')?.addEventListener('input',e=>{
    const q=e.target.value.toLowerCase();
    document.querySelector('#items-tbl tbody').innerHTML=itemRows(items.filter(i=>i.code.toLowerCase().includes(q)||i.name.toLowerCase().includes(q)));
    bindItemActions(items);
  });
  bindItemActions(items);
}

function itemRows(items){
  if(!items.length)return'<tr class="empty-row"><td colspan="8">No items found. Click + Add Item to start.</td></tr>';
  return items.map(i=>`<tr>
    <td><span style="font-family:'DM Mono',monospace;font-size:12px">${i.code}</span></td>
    <td>${i.name}</td>
    <td><span class="badge badge-${i.type.toLowerCase()}">${i.type}</span></td>
    <td>${i.item_categories?.name||'—'}</td>
    <td>${i.uom}</td>
    <td style="font-family:'DM Mono',monospace">${i.reorder_level||0}</td>
    <td><span class="badge ${i.is_active?'badge-pass':'badge-cancel'}">${i.is_active?'Active':'Inactive'}</span></td>
    <td><div class="action-btns">
      <button class="btn btn-ghost btn-sm edit-item" data-id="${i.id}">Edit</button>
      <button class="btn btn-red btn-sm del-item" data-id="${i.id}" data-name="${i.name}">Del</button>
    </div></td>
  </tr>`).join('');
}

function bindItemActions(items){
  document.querySelectorAll('.edit-item').forEach(btn=>btn.addEventListener('click',async()=>{
    const item=items.find(i=>i.id==btn.dataset.id);
    if(item)showItemModal(item,items);
  }));
  document.querySelectorAll('.del-item').forEach(btn=>btn.addEventListener('click',()=>confirmDelete('items',btn.dataset.id,btn.dataset.name)));
}

async function showItemModal(item=null){
  const{data:cats}=await db.from('item_categories').select('*');
  modal=`<div class="modal-overlay"><div class="modal">
    <div class="modal-head"><span class="modal-title">${item?'Edit Item':'New Item'}</span><button class="modal-close" id="cm">×</button></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label class="form-label">Item Code *</label><input class="form-input" id="i-code" value="${item?.code||''}" placeholder="RM01"/></div>

        <div class="form-group"><label class="form-label">Type *</label>
          <select class="form-select" id="i-type">

            <option value="SFG" ${item?.type==='SFG'?'selected':''}>SFG — Semi Finished</option>
            <option value="FG" ${item?.type==='FG'?'selected':''}>FG — Finished Good</option>
            <option value="Consumable" ${item?.type==='Consumable'?'selected':''}>Consumable</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Category</label>
          <select class="form-select" id="i-cat"><option value="">-- Select --</option>
            ${(cats||[]).map(c=>`<option value="${c.id}" ${item?.category_id==c.id?'selected':''}>${c.name}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">UOM *</label><input class="form-input" id="i-uom" value="${item?.uom||'pcs'}" placeholder="kg/pcs/ltr"/></div>
        <div class="form-group"><label class="form-label">HSN Code</label><input class="form-input" id="i-hsn" value="${item?.hsn_code||''}" placeholder="68138100"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Reorder Level</label><input class="form-input" id="i-reorder" type="number" value="${item?.reorder_level||0}"/></div>
        <div class="form-group"><label class="form-label">Reorder Qty</label><input class="form-input" id="i-reorderqty" type="number" value="${item?.reorder_qty||0}"/></div>
      </div>
      <div class="form-group"><label class="form-label">Notes</label><textarea class="form-input" id="i-notes">${item?.notes||''}</textarea></div>
      <div id="i-err" class="err-msg"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" id="cm2">Cancel</button>
      <button class="btn btn-primary btn-sm" id="save-item">${item?'Update Item':'Save Item'}</button>
    </div>
  </div></div>`;
  render();
  document.getElementById('cm').addEventListener('click',closeModal);
  document.getElementById('cm2').addEventListener('click',closeModal);
  document.getElementById('save-item').addEventListener('click',()=>saveItem(item?.id));
}

async function saveItem(id=null){
  const payload={
    code:document.getElementById('i-code').value.trim().toUpperCase(),
    name:document.getElementById('i-name').value.trim(),
    type:document.getElementById('i-type').value,
    category_id:document.getElementById('i-cat').value||null,
    uom:document.getElementById('i-uom').value.trim(),
    hsn_code:document.getElementById('i-hsn').value.trim(),
    reorder_level:parseFloat(document.getElementById('i-reorder').value)||0,
    reorder_qty:parseFloat(document.getElementById('i-reorderqty').value)||0,
    notes:document.getElementById('i-notes').value.trim(),
  };
  if(!payload.code||!payload.name){document.getElementById('i-err').textContent='Code and Name required.';return;}
  const{error}=id?await db.from('items').update(payload).eq('id',id):await db.from('items').insert(payload);
  if(error){document.getElementById('i-err').textContent=error.message;return;}
  closeModal();
}

// ── CONFIRM DELETE ──
function confirmDelete(table,id,name){
  modal=`<div class="modal-overlay"><div class="modal confirm-modal">
    <div class="modal-head"><span class="modal-title">Confirm Delete</span><button class="modal-close" id="cm">×</button></div>
    <div class="modal-body"><p class="confirm-text">Are you sure you want to delete <strong>${name}</strong>? This cannot be undone.</p></div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" id="cm2">Cancel</button>
      <button class="btn btn-red btn-sm" id="confirm-del">Yes, Delete</button>
    </div>
  </div></div>`;
  render();
  document.getElementById('cm').addEventListener('click',closeModal);
  document.getElementById('cm2').addEventListener('click',closeModal);
  document.getElementById('confirm-del').addEventListener('click',async()=>{
    await db.from(table).delete().eq('id',id);
    closeModal();
  });
}

          <div class="form-group">

            <label class="form-label">Preform Weight (grams)</label>
            <input class="form-input" id="b-pfw" type="number" placeholder="e.g. 43" value="${bom?.preform_weight_grams||''}" oninput="calcBOMParams()"/>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Back Plate Weight (grams)</label>
            <input class="form-input" id="b-bpw" type="number" placeholder="e.g. 200" value="${bom?.bp_weight_grams||''}" oninput="calcBOMParams()"/>
          </div>
          <div class="form-group">
            <label class="form-label">Die</label>
            <select class="form-select" id="b-die" onchange="calcBOMParams()">
              <option value="">-- Select Die --</option>

            <label class="form-label">Pcs per Set</label>

            <label class="form-label">Version</label>

    const pfw=parseFloat(document.getElementById('b-pfw').value)||0;
    const cav=parseInt(document.getElementById('b-cav').value)||0;
    const tray=parseInt(document.getElementById('b-tray').value)||0;
    const pset=parseInt(document.getElementById('b-set').value)||4;

    const payload={
      item_id:itemId,
      output_qty:qty,
      output_uom:document.getElementById('b-uom').value,

      oven_full_load_pcs:tray>0?tray*72:0
    };

    const{error}=isEdit?
      await db.from('bom_headers').update(payload).eq('id',bom.id):
      await db.from('bom_headers').insert(payload);
    if(error){document.getElementById('b-err').textContent=error.message;return;}
    closeModal();
  });
}

function calcBOMParams(){
  const bpw=parseFloat(document.getElementById('b-bpw')?.value)||0;
  const pfw=parseFloat(document.getElementById('b-pfw')?.value)||0;
  const cav=parseInt(document.getElementById('b-cav')?.value)||0;
  const tray=parseInt(document.getElementById('b-tray')?.value)||0;
  const el=document.getElementById('bom-calc');
  const content=document.getElementById('bom-calc-content');
  if(!el||!content) return;

  const rows=[];
  if(bpw>0) rows.push(`Shot Blast batch: <strong style="color:var(--text)">${Math.round(60000/bpw)} pcs</strong> (60kg ÷ ${bpw}g)`);
  if(tray>0) rows.push(`Oven full load: <strong style="color:var(--text)">${tray*72} pcs</strong> (72 trays × ${tray})`);
  if(cav>0) rows.push(`Moulding per shift: <strong style="color:var(--text)">${Math.floor(480/8.5)*cav} pcs</strong> (${cav} cav × 56 cycles)`);
  if(pfw>0) rows.push(`Mix per 1000 pcs: <strong style="color:var(--text)">${(pfw*1000/1000).toFixed(1)} kg</strong> MIX needed`);

  if(rows.length){
    el.style.display='block';
    content.innerHTML=rows.map(r=>`<div style="margin-bottom:4px">→ ${r}</div>`).join('');
  } else {
    el.style.display='none';
  }
}

async function saveStock(){
  const item_id=document.getElementById('s-item').value;
  const txn_type=document.getElementById('s-type').value;
  const qty=parseFloat(document.getElementById('s-qty').value)||0;
  const uom=document.getElementById('s-uom').value;
  if(!item_id||qty===0){document.getElementById('s-err').textContent='Item and quantity required.';return;}
  await db.from('inventory_transactions').insert({item_id,txn_type,qty,uom,batch_no:document.getElementById('s-batch').value,reference_no:document.getElementById('s-ref').value});
  const isOut=['Sales Dispatch','Production Issue'].includes(txn_type);
  const delta=isOut?-qty:qty;
  const{data:ex}=await db.from('inventory').select('*').eq('item_id',item_id).single();
  if(ex)await db.from('inventory').update({current_stock:(ex.current_stock||0)+delta,uom,last_updated:new Date().toISOString()}).eq('item_id',item_id);
  else await db.from('inventory').insert({item_id,current_stock:delta,uom});
  closeModal();
}

  const isEdit=!!existingPO;

  let poLines=[{itemId:'',qty:0,uom:'KG',rate:0,gst:18}];
  if(isEdit){
    const{data:lines}=await db.from('purchase_order_lines').select('*,items(id,code,name,uom)').eq('po_id',existingPO.id);
    if(lines?.length) poLines=lines.map(l=>({lineId:l.id,itemId:l.item_id?.toString(),itemLabel:l.items?.code+' — '+l.items?.name,qty:l.qty,uom:l.uom||l.items?.uom||'KG',rate:l.unit_price,gst:l.gst_percent||18}));
  }

  function renderPOLines(){
    const el=document.getElementById('po-lines-body');
    if(!el) return;
    el.innerHTML=poLines.map((line,i)=>`
      <div style="display:grid;grid-template-columns:1fr 80px 55px 90px 55px auto;gap:6px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)">
        <div id="po-line-${i}"></div>
        <input type="number" class="form-input" style="padding:6px 8px;font-size:12px;font-family:monospace" placeholder="Qty" value="${line.qty||0}"
          oninput="poLines[${i}].qty=parseFloat(this.value)||0;updatePOTotal()"/>
        <input class="form-input" style="padding:6px 8px;font-size:12px" placeholder="UOM" value="${line.uom||'KG'}"
          oninput="poLines[${i}].uom=this.value"/>
        <input type="number" class="form-input" style="padding:6px 8px;font-size:12px;font-family:monospace" placeholder="Rate ₹" value="${line.rate||0}"
          oninput="poLines[${i}].rate=parseFloat(this.value)||0;updatePOTotal()"/>
        <input type="number" class="form-input" style="padding:6px 8px;font-size:12px" placeholder="GST%" value="${line.gst||18}"
          oninput="poLines[${i}].gst=parseFloat(this.value)||0"/>
        <button onclick="poLines.splice(${i},1);renderPOLines()" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:18px;padding:0 4px" ${poLines.length<=1?'disabled':''}>×</button>
      </div>`).join('');

    poLines.forEach((line,i)=>{
      setTimeout(()=>{
        gss('po-line-'+i, rmItems.map(it=>({id:it.id.toString(),label:it.code+' — '+it.name,sub:it.uom})), {
          placeholder:'RM search...',
          selected: line.itemId||null,
          onSelect:(id)=>{
            poLines[i].itemId=id;
            const item=rmItems.find(it=>it.id.toString()===id);
            if(item?.uom) poLines[i].uom=item.uom;
          },
          onAdd:async(q)=>{const r=await gssAddItem(q,'RM');if(r)poLines[i].itemId=r.id;return r;}
        });
      },30);
    });
    updatePOTotal();
  }

  function updatePOTotal(){
    let sub=0;
    poLines.forEach(l=>{sub+=l.qty*l.rate;});
    const gst=poLines.reduce((s,l)=>s+(l.qty*l.rate*l.gst/100),0);
    const el=document.getElementById('po-total');
    if(el) el.innerHTML=`Subtotal: <strong>₹${sub.toLocaleString('en-IN')}</strong> + GST <strong>₹${gst.toFixed(0)}</strong> = <strong style="color:var(--green)">₹${(sub+gst).toLocaleString('en-IN',{maximumFractionDigits:0})}</strong>`;
  }

  modal=`<div class="modal-overlay"><div class="modal" style="max-width:780px">
    <div class="modal-head"><span class="modal-title">${isEdit?'Edit':'New'} Purchase Order</span><button class="modal-close" id="cm">×</button></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label class="form-label">PO Number</label>

          <div id="pur-sup-wrap"></div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Order Date</label>
          <input class="form-input" id="pur-date" type="date" value="${isEdit?existingPO.order_date:now}"/></div>
        <div class="form-group"><label class="form-label">Expected Date</label>
          <input class="form-input" id="pur-exp" type="date" value="${isEdit?existingPO.expected_date||'':''}"/></div>
      </div>

      <div style="margin-bottom:8px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <label class="form-label" style="margin:0;font-weight:600">Materials *</label>
          <button type="button" class="btn btn-green btn-sm" onclick="poLines.push({itemId:'',qty:0,uom:'KG',rate:0,gst:18});renderPOLines()">+ Add Material</button>
        </div>
        <div style="display:grid;grid-template-columns:1fr 80px 55px 90px 55px auto;gap:6px;padding:0 0 4px">
          <span style="font-size:10px;color:var(--text3);text-transform:uppercase;font-weight:600">Material</span>
          <span style="font-size:10px;color:var(--text3);text-transform:uppercase;font-weight:600">Qty</span>
          <span style="font-size:10px;color:var(--text3);text-transform:uppercase;font-weight:600">UOM</span>
          <span style="font-size:10px;color:var(--text3);text-transform:uppercase;font-weight:600">Rate ₹</span>
          <span style="font-size:10px;color:var(--text3);text-transform:uppercase;font-weight:600">GST%</span>
          <span></span>
        </div>
        <div id="po-lines-body"></div>
        <div id="po-total" style="margin-top:8px;font-size:13px;text-align:right;padding:6px 10px;background:var(--bg3);border-radius:6px"></div>
      </div>

      <div class="form-group"><label class="form-label">Notes</label>
        <textarea class="form-input" id="pur-notes" style="min-height:50px">${isEdit?existingPO.notes||'':''}</textarea></div>
      <div id="pur-err" class="err-msg"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" id="cm2">Cancel</button>
      <button class="btn btn-primary btn-sm" id="save-pur">${isEdit?'Update PO':'Create PO'}</button>
    </div>
  </div></div>`;
  render();

  gss('pur-sup-wrap', (sups||[]).map(s=>({id:s.id.toString(),label:s.name})), {
    placeholder:'Supplier search karo...',
    selected: isEdit?existingPO.supplier_id?.toString():null,
    onAdd:async(q)=>gssAddSupplier(q)
  });
  renderPOLines();

  document.getElementById('cm').addEventListener('click',closeModal);
  document.getElementById('cm2').addEventListener('click',closeModal);
  document.getElementById('save-pur').addEventListener('click',async()=>{
    const sup=gssGet('pur-sup-wrap');
    if(!sup){document.getElementById('pur-err').textContent='Supplier select karo.';return;}
    const validLines=poLines.filter(l=>l.itemId&&l.qty>0);
    if(!validLines.length){document.getElementById('pur-err').textContent='Kam se kam 1 material daalo.';return;}
    const btn=document.getElementById('save-pur');
    setBtnState(btn,true,isEdit?'Updating...':'Creating...');
    const subtotal=validLines.reduce((s,l)=>s+l.qty*l.rate,0);
    const gstAmt=validLines.reduce((s,l)=>s+(l.qty*l.rate*l.gst/100),0);
    let poId;
    if(isEdit){
      await db.from('purchase_orders').update({supplier_id:sup,order_date:document.getElementById('pur-date').value,expected_date:document.getElementById('pur-exp').value||null,notes:document.getElementById('pur-notes').value,total_amount:subtotal+gstAmt}).eq('id',existingPO.id);
      await db.from('purchase_order_lines').delete().eq('po_id',existingPO.id);
      poId=existingPO.id;
    } else {
      const{data:po,error}=await db.from('purchase_orders').insert({po_no:document.getElementById('pur-no').value,supplier_id:sup,order_date:document.getElementById('pur-date').value,expected_date:document.getElementById('pur-exp').value||null,notes:document.getElementById('pur-notes').value,total_amount:subtotal+gstAmt,status:'Ordered'}).select().single();
      if(error){document.getElementById('pur-err').textContent=error.message;setBtnState(btn,false,'','Create PO');return;}
      poId=po.id;
    }
    await db.from('purchase_order_lines').insert(validLines.map(l=>({po_id:poId,item_id:l.itemId,qty:l.qty,uom:l.uom,unit_price:l.rate,gst_percent:l.gst})));
    setBtnState(btn,false,'',isEdit?'Update PO':'Create PO');
    closeModal();
    showSavedPopup(isEdit?'PO Updated!':'PO Created!');
  });
}

          oninput="soLines[${i}].uom=this.value"/>

          oninput="soLines[${i}].rate=parseFloat(this.value)||0;updateSOTotal()"/>
        <input type="number" class="form-input" style="padding:6px 8px;font-size:12px" placeholder="GST%" value="${line.gst||18}"
          oninput="soLines[${i}].gst=parseFloat(this.value)||0;updateSOTotal()"/>

      </div>`).join('');

    // Init gss for each line
    soLines.forEach((line,i)=>{

        gss('so-line-'+i, fgItems.map(it=>({id:it.id.toString(),label:it.code+' — '+it.name})), {
          placeholder:'FG item...',
          selected: line.itemId||null,

  modal=`<div class="modal-overlay"><div class="modal" style="max-width:780px">
    <div class="modal-head"><span class="modal-title">${isEdit?'Edit':'New'} Sales Order</span><button class="modal-close" id="cm">×</button></div>

          <div id="so-cust-wrap"></div>
        </div>

        </div>
        <div style="display:grid;grid-template-columns:1fr 70px 55px 90px 55px auto;gap:6px;padding:0 0 4px;margin-bottom:4px">
          <span style="font-size:10px;color:var(--text3);text-transform:uppercase;font-weight:600">Item</span>
          <span style="font-size:10px;color:var(--text3);text-transform:uppercase;font-weight:600">Qty</span>

          <span style="font-size:10px;color:var(--text3);text-transform:uppercase;font-weight:600">GST%</span>
          <span></span>

  });

      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">GSTIN</label><input class="form-input" id="p-gst" value="${item?.gstin||''}" placeholder="27AABCU9603R1ZX"/></div>
        <div class="form-group"><label class="form-label">Phone</label><input class="form-input" id="p-phone" value="${item?.phone||''}" placeholder="+91 98765 43210"/></div>
      </div>
      <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="p-email" type="email" value="${item?.email||''}"/></div>
      <div class="form-group"><label class="form-label">Address</label><textarea class="form-input" id="p-addr">${item?.address||''}</textarea></div>
      <div id="p-err" class="err-msg"></div>
    </div>
    <div class="modal-footer"><button class="btn btn-ghost btn-sm" id="cm2">Cancel</button><button class="btn btn-primary btn-sm" id="save-party">${item?'Update':'Save'}</button></div>
  </div></div>`;
  render();
  document.getElementById('cm').addEventListener('click',closeModal);
  document.getElementById('cm2').addEventListener('click',closeModal);
  document.getElementById('save-party').addEventListener('click',async()=>{
    const code=document.getElementById('p-code').value.trim();
    const name=document.getElementById('p-name').value.trim();
    if(!code||!name){document.getElementById('p-err').textContent='Code and Name required.';return;}
    const payload={code,name,gstin:document.getElementById('p-gst').value,phone:document.getElementById('p-phone').value,email:document.getElementById('p-email').value,address:document.getElementById('p-addr').value};
    const tbl=isSup?'suppliers':'customers';
    const{error}=item?await db.from(tbl).update(payload).eq('id',item.id):await db.from(tbl).insert(payload);
    if(error){document.getElementById('p-err').textContent=error.message;return;}
    closeModal();
  });
}

// ── BOOT ──
async function boot(){
  const{data:{session}}=await db.auth.getSession();
  if(session){
    user=session.user;
    await loadProfile();
    page='dashboard';
    render();
    loadPage();
  } else {
    render();
  }
}
boot();


</script>
