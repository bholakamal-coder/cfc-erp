<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CFC ERP — Ceratech Friction Composites</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0f1117;
    --bg2: #181c27;
    --bg3: #1e2333;
    --border: #2a3045;
    --border2: #3a4460;
    --text: #e8eaf0;
    --text2: #8892a4;
    --text3: #5a6478;
    --accent: #3b82f6;
    --accent2: #1d4ed8;
    --green: #10b981;
    --green2: #065f46;
    --amber: #f59e0b;
    --amber2: #78350f;
    --red: #ef4444;
    --red2: #7f1d1d;
    --purple: #8b5cf6;
    --radius: 10px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

  /* LOGIN */
  .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); }
  .login-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; }
  .login-logo { font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .login-logo span { color: var(--accent); }
  .login-sub { font-size: 13px; color: var(--text2); margin-bottom: 28px; }
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; display: block; font-weight: 500; letter-spacing: .04em; text-transform: uppercase; }
  .form-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 14px; color: var(--text); font-family: inherit; font-size: 14px; outline: none; transition: border .2s; }
  .form-input:focus { border-color: var(--accent); }
  .btn { padding: 10px 20px; border-radius: var(--radius-sm); font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: all .15s; }
  .btn-primary { background: var(--accent); color: #fff; width: 100%; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-sm { padding: 6px 14px; font-size: 13px; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text2); }
  .btn-ghost:hover { border-color: var(--border2); color: var(--text); background: var(--bg3); }
  .btn-green { background: var(--green); color: #fff; }
  .btn-green:hover { opacity: .85; }
  .btn-red { background: var(--red); color: #fff; }
  .err-msg { font-size: 12px; color: var(--red); margin-top: 10px; text-align: center; }

  /* LAYOUT */
  .app { display: flex; min-height: 100vh; }
  .sidebar { width: 220px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; position: fixed; top: 0; left: 0; height: 100vh; overflow-y: auto; z-index: 100; }
  .sidebar-logo { padding: 20px 18px 16px; border-bottom: 1px solid var(--border); }
  .sidebar-logo-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .sidebar-logo-title span { color: var(--accent); }
  .sidebar-logo-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .sidebar-section { padding: 12px 10px 4px; font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: .08em; text-transform: uppercase; }
  .sidebar-item { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: var(--radius-sm); margin: 1px 8px; cursor: pointer; color: var(--text2); font-size: 13px; font-weight: 400; transition: all .15s; border: none; background: transparent; width: calc(100% - 16px); text-align: left; }
  .sidebar-item:hover { background: var(--bg3); color: var(--text); }
  .sidebar-item.active { background: rgba(59,130,246,.12); color: var(--accent); font-weight: 500; }
  .sidebar-item svg { width: 16px; height: 16px; flex-shrink: 0; }
  .sidebar-footer { margin-top: auto; padding: 12px; border-top: 1px solid var(--border); }
  .user-info { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
  .user-name { font-weight: 500; color: var(--text); font-size: 13px; }

  .main { margin-left: 220px; flex: 1; min-height: 100vh; }
  .topbar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
  .topbar-title { font-size: 16px; font-weight: 500; }
  .topbar-actions { display: flex; gap: 8px; align-items: center; }
  .content { padding: 24px; }

  /* CARDS & STATS */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; }
  .stat-label { font-size: 11px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
  .stat-value { font-size: 26px; font-weight: 600; color: var(--text); font-family: 'DM Mono', monospace; }
  .stat-sub { font-size: 12px; color: var(--text3); margin-top: 4px; }
  .stat-card.green { border-color: rgba(16,185,129,.25); }
  .stat-card.amber { border-color: rgba(245,158,11,.25); }
  .stat-card.blue { border-color: rgba(59,130,246,.25); }
  .stat-card.red { border-color: rgba(239,68,68,.25); }

  /* TABLE */
  .table-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .table-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .table-title { font-size: 14px; font-weight: 500; }
  .search-input { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 7px 12px; color: var(--text); font-family: inherit; font-size: 13px; outline: none; width: 220px; }
  .search-input:focus { border-color: var(--accent); }
  table { width: 100%; border-collapse: collapse; }
  th { padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; border-bottom: 1px solid var(--border); background: var(--bg3); }
  td { padding: 11px 14px; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,.02); }
  .empty-row td { text-align: center; color: var(--text3); padding: 32px; }

  /* BADGE */
  .badge { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
  .badge-rm { background: rgba(245,158,11,.15); color: #fbbf24; }
  .badge-sfg { background: rgba(59,130,246,.15); color: #60a5fa; }
  .badge-fg { background: rgba(16,185,129,.15); color: #34d399; }
  .badge-con { background: rgba(139,92,246,.15); color: #a78bfa; }
  .badge-mts { background: rgba(245,158,11,.15); color: #fbbf24; }
  .badge-mto { background: rgba(59,130,246,.15); color: #60a5fa; }
  .badge-draft { background: rgba(90,100,120,.2); color: var(--text2); }
  .badge-planned { background: rgba(59,130,246,.15); color: #60a5fa; }
  .badge-inprog { background: rgba(245,158,11,.15); color: #fbbf24; }
  .badge-done { background: rgba(16,185,129,.15); color: #34d399; }
  .badge-cancel { background: rgba(239,68,68,.15); color: #f87171; }
  .badge-pass { background: rgba(16,185,129,.15); color: #34d399; }
  .badge-fail { background: rgba(239,68,68,.15); color: #f87171; }
  .badge-hold { background: rgba(245,158,11,.15); color: #fbbf24; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; }
  .modal-head { padding: 18px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-size: 15px; font-weight: 500; }
  .modal-close { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 20px; line-height: 1; }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 22px; }
  .modal-footer { padding: 14px 22px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-select { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 14px; color: var(--text); font-family: inherit; font-size: 14px; outline: none; }
  .form-select:focus { border-color: var(--accent); }
  textarea.form-input { resize: vertical; min-height: 70px; }

  /* BOM TREE */
  .bom-tree { background: var(--bg3); border-radius: var(--radius-sm); padding: 14px; }
  .bom-node { display: flex; align-items: center; gap: 8px; padding: 5px 0; }
  .bom-indent { width: 20px; height: 1px; background: var(--border); flex-shrink: 0; }
  .bom-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .bom-item-name { font-size: 13px; color: var(--text); }
  .bom-item-qty { font-size: 12px; color: var(--text2); margin-left: auto; font-family: 'DM Mono', monospace; }

  /* TABS */
  .tabs { display: flex; gap: 2px; background: var(--bg3); border-radius: var(--radius-sm); padding: 3px; margin-bottom: 20px; width: fit-content; }
  .tab { padding: 7px 16px; border-radius: 5px; font-size: 13px; cursor: pointer; color: var(--text2); border: none; background: transparent; font-family: inherit; transition: all .15s; }
  .tab.active { background: var(--bg2); color: var(--text); font-weight: 500; border: 1px solid var(--border); }

  /* ALERTS */
  .alert { padding: 12px 16px; border-radius: var(--radius-sm); margin-bottom: 14px; font-size: 13px; }
  .alert-warning { background: rgba(245,158,11,.1); border: 1px solid rgba(245,158,11,.3); color: #fbbf24; }
  .alert-success { background: rgba(16,185,129,.1); border: 1px solid rgba(16,185,129,.3); color: #34d399; }
  .alert-info { background: rgba(59,130,246,.1); border: 1px solid rgba(59,130,246,.3); color: #60a5fa; }

  /* LOADER */
  .loader { display: flex; align-items: center; justify-content: center; padding: 48px; color: var(--text3); font-size: 13px; gap: 10px; }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 20px; font-size: 12px; border: 1px solid var(--border); color: var(--text2); background: var(--bg3); margin: 2px; }
  .page-header { margin-bottom: 20px; }
  .page-header h2 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
  .page-header p { font-size: 13px; color: var(--text2); }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
  .card-title { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 12px; text-transform: uppercase; letter-spacing: .05em; font-size: 11px; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; background: var(--bg3); color: var(--text2); border: 1px solid var(--border); margin: 2px; }
  @media (max-width: 768px) {
    .sidebar { width: 60px; }
    .sidebar-item span, .sidebar-logo-title, .sidebar-logo-sub, .sidebar-section, .user-info, .user-name { display: none; }
    .main { margin-left: 60px; }
    .form-row { grid-template-columns: 1fr; }
    .grid2 { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
const SUPABASE_URL = 'https://hfufhcsvbrzygoykvtah.supabase.co';
const SUPABASE_KEY = 'sb_publishable_iqs1Q7TrS4j28CWqv3TUJQ_57WHtgB9';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let currentPage = 'dashboard';
let currentUser = null;
let currentProfile = null;
let modal = null;

// ===================== RENDER ENGINE =====================
function render() {
  document.getElementById('app').innerHTML = currentUser ? appHTML() : loginHTML();
  attachEvents();
}

// ===================== LOGIN =====================
function loginHTML() {
  return `
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">CFC <span>ERP</span></div>
      <div class="login-sub">Ceratech Friction Composites · Ceradrive Brakes</div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" id="l-email" type="email" placeholder="you@company.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" id="l-pass" type="password" placeholder="••••••••"/>
      </div>
      <button class="btn btn-primary" id="login-btn">Sign In</button>
      <div id="login-err" class="err-msg"></div>
      <div style="margin-top:16px;text-align:center">
        <span style="font-size:12px;color:var(--text3)">No account? </span>
        <button class="btn btn-sm btn-ghost" id="show-signup" style="font-size:12px">Create one</button>
      </div>
    </div>
  </div>`;
}

// ===================== APP SHELL =====================
function appHTML() {
  const name = currentProfile?.full_name || currentUser?.email || 'User';
  const role = currentProfile?.role || 'admin';
  return `
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-title">CFC <span>ERP</span></div>
        <div class="sidebar-logo-sub">Brake Pad Manufacturing</div>
      </div>
      <div class="sidebar-section">Main</div>
      ${navItem('dashboard','dashboard','Dashboard')}
      ${navItem('production','activity','Production Orders')}
      ${navItem('planning','calendar','Daily Planning')}
      <div class="sidebar-section">Master Data</div>
      ${navItem('items','package','Item Master')}
      ${navItem('bom','layers','Bill of Materials')}
      ${navItem('machines','settings','Machines')}
      <div class="sidebar-section">Operations</div>
      ${navItem('inventory','archive','Inventory')}
      ${navItem('qc','shield','Quality Control')}
      ${navItem('packing','box','Packing & Dispatch')}
      <div class="sidebar-section">Finance</div>
      ${navItem('purchase','shopping-cart','Purchase')}
      ${navItem('sales','trending-up','Sales')}
      ${navItem('suppliers','users','Suppliers')}
      ${navItem('customers','user-check','Customers')}
      <div class="sidebar-footer">
        <div class="user-name">${name}</div>
        <div class="user-info">${role}</div>
        <button class="btn btn-ghost btn-sm" id="logout-btn" style="width:100%;margin-top:8px">Sign Out</button>
      </div>
    </aside>
    <main class="main">
      <div class="topbar">
        <div class="topbar-title">${pageTitle()}</div>
        <div class="topbar-actions" id="topbar-actions"></div>
      </div>
      <div class="content" id="page-content">
        <div class="loader"><div class="spinner"></div> Loading...</div>
      </div>
    </main>
  </div>
  ${modal ? modal : ''}`;
}

function navItem(page, icon, label) {
  const icons = {
    dashboard: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>',
    activity: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>',
    calendar: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
    package: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16v-2"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>',
    layers: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>',
    settings: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>',
    archive: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>',
    shield: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',
    box: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>',
    'shopping-cart': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>',
    'trending-up': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>',
    users: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
    'user-check': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><polyline points="17 11 19 13 23 9"/></svg>',
  };
  return `<button class="sidebar-item ${currentPage===page?'active':''}" data-page="${page}">${icons[icon]||''}<span>${label}</span></button>`;
}

function pageTitle() {
  const titles = { dashboard:'Dashboard', production:'Production Orders', planning:'Daily Planning', items:'Item Master', bom:'Bill of Materials', machines:'Machines', inventory:'Inventory', qc:'Quality Control', packing:'Packing & Dispatch', purchase:'Purchase Orders', sales:'Sales Orders', suppliers:'Suppliers', customers:'Customers' };
  return titles[currentPage] || 'CFC ERP';
}

// ===================== EVENTS =====================
function attachEvents() {
  document.querySelectorAll('[data-page]').forEach(el => {
    el.addEventListener('click', () => { currentPage = el.dataset.page; modal = null; render(); loadPage(); });
  });
  const logoutBtn = document.getElementById('logout-btn');
  if (logoutBtn) logoutBtn.addEventListener('click', async () => { await db.auth.signOut(); currentUser = null; currentProfile = null; render(); });
  const loginBtn = document.getElementById('login-btn');
  if (loginBtn) loginBtn.addEventListener('click', doLogin);
  const signupBtn = document.getElementById('show-signup');
  if (signupBtn) signupBtn.addEventListener('click', showSignup);
  if (currentUser) loadPage();
}

async function doLogin() {
  const email = document.getElementById('l-email').value;
  const pass = document.getElementById('l-pass').value;
  const errEl = document.getElementById('login-err');
  errEl.textContent = '';
  const { data, error } = await db.auth.signInWithPassword({ email, password: pass });
  if (error) { errEl.textContent = error.message; return; }
  currentUser = data.user;
  await loadProfile();
  currentPage = 'dashboard';
  render();
}

function showSignup() {
  modal = `<div class="modal-overlay" id="signup-overlay">
    <div class="modal">
      <div class="modal-head"><span class="modal-title">Create Account</span><button class="modal-close" id="close-modal">×</button></div>
      <div class="modal-body">

async function doSignup() {
  const name = document.getElementById('s-name').value;
  const email = document.getElementById('s-email').value;
  const pass = document.getElementById('s-pass').value;
  const role = document.getElementById('s-role').value;
  const errEl = document.getElementById('signup-err');
  const { data, error } = await db.auth.signUp({ email, password: pass });
  if (error) { errEl.textContent = error.message; return; }
  if (data.user) {
    await db.from('user_profiles').insert({ id: data.user.id, full_name: name, role });
    errEl.style.color = 'var(--green)';
    errEl.textContent = 'Account created! Please sign in.';
  }
}

// ===================== PAGE LOADER =====================
async function loadPage() {
  const el = document.getElementById('page-content');
  const acts = document.getElementById('topbar-actions');
  if (!el) return;
  el.innerHTML = '<div class="loader"><div class="spinner"></div> Loading...</div>';
  if (acts) acts.innerHTML = '';
  const pages = { dashboard: loadDashboard, items: loadItems, bom: loadBOM, machines: loadMachines, production: loadProduction, planning: loadPlanning, inventory: loadInventory, qc: loadQC, packing: loadPacking, purchase: loadPurchase, sales: loadSales, suppliers: loadSuppliers, customers: loadCustomers };
  if (pages[currentPage]) await pages[currentPage](el, acts);
  else el.innerHTML = '<div class="loader">Page coming soon</div>';
}

// ===================== DASHBOARD =====================
async function loadDashboard(el) {
  const [items, orders, inventory, qc] = await Promise.all([
    db.from('items').select('id,type'),
    db.from('production_orders').select('id,status,order_type'),
    db.from('inventory').select('current_stock,item_id'),
    db.from('qc_records').select('id,status')
  ]);
  const itemCount = items.data?.length || 0;
  const activeOrders = orders.data?.filter(o => ['Planned','In Progress'].includes(o.status)).length || 0;
  const mtoOrders = orders.data?.filter(o => o.order_type === 'MTO' && o.status !== 'Completed').length || 0;
  const failedQC = qc.data?.filter(q => q.status === 'Fail').length || 0;
  el.innerHTML = `
  <div class="page-header"><h2>Good ${greeting()}</h2><p>Here's what's happening at Ceratech today.</p></div>
  <div class="stats-grid">
    <div class="stat-card blue"><div class="stat-label">Total Items</div><div class="stat-value">${itemCount}</div><div class="stat-sub">In item master</div></div>
    <div class="stat-card amber"><div class="stat-label">Active Orders</div><div class="stat-value">${activeOrders}</div><div class="stat-sub">In production</div></div>
    <div class="stat-card green"><div class="stat-label">MTO Pending</div><div class="stat-value">${mtoOrders}</div><div class="stat-sub">Make to order</div></div>
    <div class="stat-card red"><div class="stat-label">QC Failures</div><div class="stat-value">${failedQC}</div><div class="stat-sub">Needs attention</div></div>
  </div>
  <div class="grid2">
    <div class="card">
      <div class="card-title">Production Flow</div>
      ${flowStep('Mixing → Preforming','RM to Preform')}
      ${flowStep('Moulding','Preform + Back Plate')}
      ${flowStep('Grinding → Coating → Curing','Finishing')}
      ${flowStep('Stacking','MTS stops here ⬛')}
      ${flowStep('Packing → Dispatch','MTO continues')}
    </div>
    <div class="card">
      <div class="card-title">Recent Orders</div>
      <div id="recent-orders"><div class="loader" style="padding:20px"><div class="spinner"></div></div></div>
    </div>
  </div>`;
  const { data: recentOrders } = await db.from('production_orders').select('order_no,order_type,status,planned_date').order('created_at', { ascending: false }).limit(5);
  const rEl = document.getElementById('recent-orders');
  if (rEl) {
    if (!recentOrders?.length) { rEl.innerHTML = '<p style="color:var(--text3);font-size:13px">No orders yet. Create your first production order.</p>'; }
    else rEl.innerHTML = recentOrders.map(o => `<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)"><span style="font-size:13px">${o.order_no}</span><span class="badge badge-${o.order_type.toLowerCase()}">${o.order_type}</span><span class="badge badge-${statusClass(o.status)}">${o.status}</span></div>`).join('');
  }
}

function flowStep(title, sub) {
  return `<div style="display:flex;gap:10px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)"><div style="width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0"></div><div><div style="font-size:13px;font-weight:500">${title}</div><div style="font-size:11px;color:var(--text3)">${sub}</div></div></div>`;
}
function greeting() { const h = new Date().getHours(); return h < 12 ? 'Morning' : h < 17 ? 'Afternoon' : 'Evening'; }
function statusClass(s) { const m = {'Draft':'draft','Planned':'planned','In Progress':'inprog','Completed':'done','Cancelled':'cancel','Stacked':'planned','Packed':'done'}; return m[s]||'draft'; }

async function loadItems(el, acts) {
  if (acts) acts.innerHTML = `<button class="btn btn-primary btn-sm" id="add-item-btn">+ Add Item</button>`;

  <div class="table-wrap">
    <div class="table-header">

    </div>

      <thead><tr><th>Code</th><th>Name</th><th>Type</th><th>Category</th><th>UOM</th><th>Reorder Lvl</th><th>Status</th></tr></thead>
      <tbody>${renderItemRows(items||[])}</tbody>
    </table>
  </div>`;

    <td><span class="badge badge-${i.type.toLowerCase()}">${i.type}</span></td>
    <td>${i.item_categories?.name||'-'}</td>

async function saveItem(id=null) {
  const payload = {
    code: document.getElementById('i-code').value.trim().toUpperCase(),
    name: document.getElementById('i-name').value.trim(),
    type: document.getElementById('i-type').value,
    category_id: document.getElementById('i-cat').value || null,
    uom: document.getElementById('i-uom').value.trim(),
    hsn_code: document.getElementById('i-hsn').value.trim(),
    reorder_level: parseFloat(document.getElementById('i-reorder').value)||0,
    reorder_qty: parseFloat(document.getElementById('i-reorderqty').value)||0,
    notes: document.getElementById('i-notes').value.trim(),
  };
  if (!payload.code || !payload.name) { document.getElementById('item-err').textContent = 'Code and Name are required.'; return; }
  const { error } = id ? await db.from('items').update(payload).eq('id', id) : await db.from('items').insert(payload);
  if (error) { document.getElementById('item-err').textContent = error.message; return; }
  modal = null; render(); loadPage();
}

function renderPORows(orders) {
  if (!orders.length) return '<tr class="empty-row"><td colspan="8">No production orders yet.</td></tr>';
  return orders.map(o=>`<tr>

async function saveStock() {
  const item_id = document.getElementById('s-item').value;
  const txn_type = document.getElementById('s-type').value;
  const qty = parseFloat(document.getElementById('s-qty').value)||0;
  const uom = document.getElementById('s-uom').value;
  const batch_no = document.getElementById('s-batch').value;
  const reference_no = document.getElementById('s-ref').value;
  if (!item_id || qty===0) { document.getElementById('s-err').textContent = 'Item and quantity required.'; return; }
  await db.from('inventory_transactions').insert({ item_id, txn_type, qty, uom, batch_no, reference_no });
  const isOut = ['Sales Dispatch','Production Issue'].includes(txn_type);
  const delta = isOut ? -qty : qty;
  const { data: existing } = await db.from('inventory').select('*').eq('item_id', item_id).single();
  if (existing) {
    await db.from('inventory').update({ current_stock: (existing.current_stock||0)+delta, uom, last_updated: new Date().toISOString() }).eq('item_id', item_id);
  } else {
    await db.from('inventory').insert({ item_id, current_stock: delta, uom });
  }
  modal=null; render(); loadPage();
}

async function showPartyModal(type) {
  const isSupplier = type === 'supplier';
  const code = (isSupplier?'SUP':'CUS') + '-' + Date.now().toString().slice(-4);
  modal = `<div class="modal-overlay">
    <div class="modal">
      <div class="modal-head"><span class="modal-title">Add ${isSupplier?'Supplier':'Customer'}</span><button class="modal-close" id="close-modal">×</button></div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group"><label class="form-label">Code *</label><input class="form-input" id="p-code" value="${code}"/></div>
          <div class="form-group"><label class="form-label">Name *</label><input class="form-input" id="p-name" placeholder="Company name"/></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">GSTIN</label><input class="form-input" id="p-gst" placeholder="27AABCU9603R1ZX"/></div>
          <div class="form-group"><label class="form-label">Phone</label><input class="form-input" id="p-phone" placeholder="+91 98765 43210"/></div>
        </div>
        <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="p-email" type="email"/></div>
        <div class="form-group"><label class="form-label">Address</label><textarea class="form-input" id="p-addr"></textarea></div>
        <div id="p-err" class="err-msg"></div>
      </div>
      <div class="modal-footer"><button class="btn btn-ghost btn-sm" id="close-modal2">Cancel</button><button class="btn btn-primary btn-sm" id="save-party-btn">Save</button></div>
    </div>
  </div>`;
  render();
  document.getElementById('close-modal').addEventListener('click', () => { modal=null; render(); loadPage(); });
  document.getElementById('close-modal2').addEventListener('click', () => { modal=null; render(); loadPage(); });
  document.getElementById('save-party-btn').addEventListener('click', async () => {
    const code = document.getElementById('p-code').value.trim();
    const name = document.getElementById('p-name').value.trim();
    if (!code||!name) { document.getElementById('p-err').textContent = 'Code and Name required.'; return; }
    const payload = { code, name, gstin: document.getElementById('p-gst').value, phone: document.getElementById('p-phone').value, email: document.getElementById('p-email').value, address: document.getElementById('p-addr').value };
    const { error } = await db.from(isSupplier?'suppliers':'customers').insert(payload);
    if (error) { document.getElementById('p-err').textContent = error.message; return; }
    modal=null; render(); loadPage();
  });
}

// ===================== BOOT =====================
async function boot() {
  const { data: { session } } = await db.auth.getSession();
  if (session) { currentUser = session.user; await loadProfile(); currentPage = 'dashboard'; }
  render();
}

boot();
