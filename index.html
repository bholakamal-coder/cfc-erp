// ── SMART SEARCHABLE SELECT ──
// Usage: smartSelect(containerId, options, selectedId, onSelect, onAddNew)
// options = [{id, label}]
function smartSelect(containerId, options, selectedId, onSelect, onAddNew){
  const wrap=document.getElementById(containerId);
  if(!wrap) return;
  const selected=options.find(o=>o.id==selectedId);
  wrap.innerHTML=`
    <div class="smart-select-wrap" id="ssw-${containerId}">
      <input class="smart-select-input" id="ssi-${containerId}" 
        placeholder="Search or select..." 
        value="${selected?.label||''}" 
        readonly
        onclick="toggleSmartSelect('${containerId}')"/>
      <div class="smart-select-dropdown" id="ssd-${containerId}">
        <input class="smart-select-search" id="sss-${containerId}" 
          placeholder="Type to search..." 
          oninput="filterSmartSelect('${containerId}')"
          onclick="event.stopPropagation()"/>
        <div id="sslist-${containerId}"></div>
        ${onAddNew?`<div class="smart-select-add" onclick="handleSmartAddNew('${containerId}')">+ Add New</div>`:''}
      </div>
    </div>`;
  
  // Store data on element
  wrap._ssData={options,selectedId,onSelect,onAddNew};
  renderSmartOptions(containerId, options, selectedId, onSelect);
  
  // Close on outside click
  document.addEventListener('click', function closeDD(e){
    const dd=document.getElementById('ssd-'+containerId);
    const inp=document.getElementById('ssi-'+containerId);
    if(dd&&inp&&!dd.contains(e.target)&&e.target!==inp){
      dd.classList.remove('open');
      document.removeEventListener('click',closeDD);
    }
  });
}

function toggleSmartSelect(id){
  const dd=document.getElementById('ssd-'+id);
  const search=document.getElementById('sss-'+id);
  if(!dd) return;
  dd.classList.toggle('open');
  if(dd.classList.contains('open')&&search){
    search.value='';
    filterSmartSelect(id);
    setTimeout(()=>search.focus(),50);
  }
}

function filterSmartSelect(id){
  const wrap=document.getElementById(id);
  if(!wrap||!wrap._ssData) return;
  const q=document.getElementById('sss-'+id)?.value?.toLowerCase()||'';
  const filtered=wrap._ssData.options.filter(o=>o.label.toLowerCase().includes(q));
  renderSmartOptions(id, filtered, wrap._ssData.selectedId, wrap._ssData.onSelect);
}

function renderSmartOptions(id, options, selectedId, onSelect){
  const list=document.getElementById('sslist-'+id);
  if(!list) return;
  if(!options.length){
    list.innerHTML='<div class="smart-select-empty">Koi result nahi</div>';
    return;
  }
  list.innerHTML=options.map(o=>`
    <div class="smart-select-option ${o.id==selectedId?'selected':''}" 
      onclick="selectSmartOption('${id}','${o.id}',${JSON.stringify(o.label).replace(/"/g,'&quot;')})">
      ${o.label}
    </div>`).join('');
}

function selectSmartOption(id, optId, label){
  const wrap=document.getElementById(id);
  if(!wrap) return;
  wrap._ssData.selectedId=optId;
  document.getElementById('ssi-'+id).value=label;
  document.getElementById('ssd-'+id)?.classList.remove('open');
  if(wrap._ssData.onSelect) wrap._ssData.onSelect(optId, label);
}

function handleSmartAddNew(id){
  const wrap=document.getElementById(id);
  document.getElementById('ssd-'+id)?.classList.remove('open');
  if(wrap?._ssData?.onAddNew) wrap._ssData.onAddNew(id);
}

function setBtnState(btn,loading,loadText='Saving...',orig=null){
  if(!btn) return;
  if(loading){btn._orig=orig||btn.textContent;btn.disabled=true;btn.innerHTML='<span style="display:flex;align-items:center;gap:5px"><span style="width:11px;height:11px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;display:inline-block;animation:spin .6s linear infinite"></span>'+loadText+'</span>';btn.style.opacity='.8';}
  else{btn.disabled=false;btn.textContent=btn._orig||orig||'Save';btn.style.opacity='1';}
}
function showSavedPopup(msg='✓ Saved!'){
  const p=document.createElement('div');
  p.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.8);background:var(--bg2);border:1px solid var(--green);border-radius:12px;padding:18px 28px;font-size:15px;font-weight:600;color:var(--green);z-index:9999;box-shadow:0 8px 40px rgba(0,0,0,.6);display:flex;align-items:center;gap:10px;animation:popIn .2s ease forwards';
  p.innerHTML='<span style="font-size:22px">✅</span><span>'+msg+'</span>';
  const s=document.createElement('style');s.textContent='@keyframes popIn{from{opacity:0;transform:translate(-50%,-50%) scale(.8)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}';
  document.head.appendChild(s);document.body.appendChild(p);
  setTimeout(()=>{p.style.animation='popIn .2s ease reverse';setTimeout(()=>p.remove(),200);},1500);
}
function showToast(msg){
  let t=document.getElementById('cfc-toast');
  if(!t){t=document.createElement('div');t.id='cfc-toast';t.style.cssText='position:fixed;bottom:20px;right:20px;background:#10b981;color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:9999;display:none';document.body.appendChild(t);}
  t.textContent=msg;t.style.display='block';
  clearTimeout(t._timer);t._timer=setTimeout(()=>t.style.display='none',3000);
}

const pageTitles={dashboard:'Dashboard',production:'Production Orders',planning:'Daily Planning',items:'Item Master',bom:'Bill of Materials',machines:'Machines',inventory:'Inventory',qc:'Quality Control',packing:'Packing & Dispatch',purchase:'Purchase Orders',sales:'Sales Orders',suppliers:'Suppliers',customers:'Customers'};

function attachEvents(){
  document.querySelectorAll('[data-page]').forEach(el=>el.addEventListener('click',()=>{page=el.dataset.page;modal=null;render();loadPage();}));
  document.getElementById('logout-btn')?.addEventListener('click',async()=>{await db.auth.signOut();user=null;profile=null;render();});
  document.getElementById('login-btn')?.addEventListener('click',doLogin);
  document.getElementById('show-signup')?.addEventListener('click',showSignup);
  if(user)loadPage();
}

async function doLogin(){
  const email=document.getElementById('l-email').value;
  const pass=document.getElementById('l-pass').value;
  const err=document.getElementById('login-err');
  err.textContent='';
  const{data,error}=await db.auth.signInWithPassword({email,password:pass});
  if(error){err.textContent=error.message;return;}
  user=data.user;await loadProfile();page='dashboard';render();
}

function showSignup(){
  modal=`<div class="modal-overlay"><div class="modal">
    <div class="modal-head"><span class="modal-title">Create Account</span><button class="modal-close" id="cm">×</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Full Name</label><input class="form-input" id="s-name"/></div>
      <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="s-email" type="email"/></div>
      <div class="form-group"><label class="form-label">Password</label><input class="form-input" id="s-pass" type="password"/></div>
      <div class="form-group"><label class="form-label">Role</label>
        <select class="form-select" id="s-role">
          <option value="admin">Admin</option><option value="production">Production</option>
          <option value="qc">QC</option><option value="packing">Packing</option>
          <option value="store">Store</option><option value="accounts">Accounts</option>
        </select>
      </div>
      <div id="s-err" class="err-msg"></div>
    </div>
    <div class="modal-footer"><button class="btn btn-primary btn-sm" id="do-signup">Create Account</button></div>
  </div></div>`;
  render();
  document.getElementById('cm').addEventListener('click',closeModal);
  document.getElementById('do-signup').addEventListener('click',async()=>{
    const{data,error}=await db.auth.signUp({email:document.getElementById('s-email').value,password:document.getElementById('s-pass').value});
    if(error){document.getElementById('s-err').textContent=error.message;return;}
    if(data.user)await db.from('user_profiles').insert({id:data.user.id,full_name:document.getElementById('s-name').value,role:document.getElementById('s-role').value});
    document.getElementById('s-err').style.color='var(--green)';
    document.getElementById('s-err').textContent='Account created! Please sign in.';
  });
}

async function loadProfile(){
  if(!user)return;
  const{data}=await db.from('user_profiles').select('*').eq('id',user.id).single();
  profile=data;
}

function closeModal(){modal=null;render();loadPage();}

async function loadPage(){
  const el=document.getElementById('page-content');
  const acts=document.getElementById('topbar-actions');
  if(!el)return;
  el.innerHTML='<div class="loader"><div class="spinner"></div> Loading...</div>';
  if(acts)acts.innerHTML='';
  const pages={dashboard:loadDashboard,items:loadItems,bom:loadBOM,machines:loadMachines,production:loadProduction,planning:loadPlanning,inventory:loadInventory,qc:loadQC,packing:loadPacking,purchase:loadPurchase,sales:loadSales,suppliers:loadSuppliers,customers:loadCustomers};
  if(pages[page])await pages[page](el,acts);
  else el.innerHTML='<div class="loader">Coming soon</div>';
}

async function loadDashboard(el){
  const today=new Date().toISOString().split('T')[0];
  const hour=new Date().getHours();
  const greeting=hour<12?'Good Morning':hour<17?'Good Afternoon':'Good Evening';

  const[
    {data:items},{data:orders},{data:ops},
    {data:inv},{data:machines},{data:halts},
    {data:sos},{data:workers},{data:att}
  ]=await Promise.all([
    db.from('items').select('id',{count:'exact'}),
    db.from('production_orders').select('id,order_no,order_type,status,items(code)').in('status',['Planned','In Progress']).order('created_at',{ascending:false}).limit(5),
    db.from('production_order_operations').select('status').eq('status','In Progress'),
    db.from('inventory').select('current_stock,items(code,name,type,reorder_level)'),
    db.from('machines').select('*').eq('is_active',true),
    db.from('machine_halts').select('machine_id').is('halt_end',null),
    db.from('sales_orders').select('so_no,status,total_amount,customers(name)').in('status',['Confirmed']).order('created_at',{ascending:false}).limit(3),
    db.from('workers').select('id').eq('is_active',true),
    db.from('attendance').select('status').eq('att_date',today)
  ]);

  const running=(ops||[]).length;
  const haltedIds=new Set((halts||[]).map(h=>h.machine_id));
  const lowRM=(inv||[]).filter(i=>i.items?.type==='RM'&&(i.current_stock||0)<=(i.items?.reorder_level||0));
  const lowSFG=(inv||[]).filter(i=>i.items?.type==='SFG'&&(i.current_stock||0)<=(i.items?.reorder_level||0)&&(i.items?.reorder_level||0)>0);
  const present=(att||[]).filter(a=>a.status==='Present').length;
  const totalWorkers=workers?.length||0;

  el.innerHTML=`
  <div style="margin-bottom:20px">
    <div style="font-size:22px;font-weight:600;margin-bottom:4px">${greeting} 👋</div>
    <div style="font-size:13px;color:var(--text2)">Here's what's happening at Ceratech today.</div>
  </div>

  <div class="grid2" style="margin-bottom:16px">
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
      <div class="stat-card ${running>0?'green':'amber'}">
        <div class="stat-label">Running Now</div>
        <div class="stat-value">${running}</div>
        <div class="stat-sub">Operations active</div>
      </div>
      <div class="stat-card ${haltedIds.size>0?'red':'green'}">
        <div class="stat-label">Halted</div>
        <div class="stat-value">${haltedIds.size}</div>
        <div class="stat-sub">Machines stopped</div>
      </div>
      <div class="stat-card ${lowRM.length>0?'red':'green'}">
        <div class="stat-label">RM Alerts</div>
        <div class="stat-value">${lowRM.length+lowSFG.length}</div>
        <div class="stat-sub">${lowRM.length} RM, ${lowSFG.length} SFG low</div>
      </div>
      <div class="stat-card blue">
        <div class="stat-label">Active Orders</div>
        <div class="stat-value">${orders?.length||0}</div>
        <div class="stat-sub">In production</div>
      </div>
      <div class="stat-card ${present<totalWorkers*0.7?'red':'green'}">
        <div class="stat-label">Workers</div>
        <div class="stat-value">${present||'—'}</div>
        <div class="stat-sub">Present today</div>
      </div>
      <div class="stat-card amber">
        <div class="stat-label">Pending SO</div>
        <div class="stat-value">${sos?.length||0}</div>
        <div class="stat-sub">To dispatch</div>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;gap:10px">
      <!-- Quick Links -->
      <div class="table-wrap" style="padding:12px 16px">
        <div style="font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Quick Access</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
          <a href="/dashboard" style="display:block;padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);text-decoration:none;font-size:12px;font-weight:500;transition:all .15s" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">📊 Command Center</a>
          <a href="/mrp" style="display:block;padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);text-decoration:none;font-size:12px;font-weight:500;transition:all .15s" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">⚙ MRP / MES</a>
          <a href="/planner" style="display:block;padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);text-decoration:none;font-size:12px;font-weight:500;transition:all .15s" onmouseover="this.style.borderColor='var(--green)'" onmouseout="this.style.borderColor='var(--border)'">🎯 Planner</a>
          <a href="/oven" style="display:block;padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);text-decoration:none;font-size:12px;font-weight:500;transition:all .15s" onmouseover="this.style.borderColor='var(--amber)'" onmouseout="this.style.borderColor='var(--border)'">🔥 Oven</a>
          <a href="/invoice" style="display:block;padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);text-decoration:none;font-size:12px;font-weight:500;transition:all .15s" onmouseover="this.style.borderColor='var(--purple)'" onmouseout="this.style.borderColor='var(--border)'">🧾 Invoice</a>
          <a href="/operator" style="display:block;padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);text-decoration:none;font-size:12px;font-weight:500;transition:all .15s" onmouseover="this.style.borderColor='var(--green)'" onmouseout="this.style.borderColor='var(--border)'">👷 Operator</a>
        </div>
      </div>
    </div>
  </div>

  <div class="grid2">
    <!-- Machine Status -->
    <div class="table-wrap">
      <div class="table-header"><span class="table-title">Machine Status</span></div>
      ${(machines||[]).slice(0,8).map(m=>{
        const isHalted=haltedIds.has(m.id);
        const statusColor=isHalted?'var(--red)':m.operation==='Moulding'?'var(--amber)':'var(--text3)';
        const dot=isHalted?'🔴':m.operation==='Moulding'?'🟡':'⚫';

            <div style="font-size:13px;font-weight:500">${m.name}</div>
            <div style="font-size:11px;color:var(--text3)">${m.operation}</div>

        </div>`;
      }).join('')}
    </div>

    <!-- Stock Alerts + Pending SO -->
    <div style="display:flex;flex-direction:column;gap:10px">
      <div class="table-wrap">
        <div class="table-header"><span class="table-title">Stock Alerts</span><span style="font-size:12px;color:var(--text3)">${lowRM.length+lowSFG.length} items</span></div>

// ── ITEMS ──
async function loadItems(el,acts){
  if(acts)acts.innerHTML=`<button class="btn btn-primary btn-sm" id="add-item-btn">+ Add Item</button>`;
  const{data:items}=await db.from('items').select('*,item_categories(name)').order('code');
  renderItemsTable(el,items||[]);
  document.getElementById('add-item-btn')?.addEventListener('click',()=>showItemModal(null,items||[]));
}

function renderItemsTable(el,items){
  el.innerHTML=`<div class="table-wrap">
    <div class="table-header"><span class="table-title">All Items (${items.length})</span><input class="search-input" id="item-search" placeholder="Search items..."/></div>
    <table id="items-tbl">
      <thead><tr><th>Code</th><th>Name</th><th>Type</th><th>Category</th><th>UOM</th><th>Reorder</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>${itemRows(items)}</tbody>
    </table>
  </div>`;
  document.getElementById('item-search')?.addEventListener('input',e=>{
    const q=e.target.value.toLowerCase();
    document.querySelector('#items-tbl tbody').innerHTML=itemRows(items.filter(i=>i.code.toLowerCase().includes(q)||i.name.toLowerCase().includes(q)));
    bindItemActions(items);
  });
  bindItemActions(items);
}

function itemRows(items){
  if(!items.length)return'<tr class="empty-row"><td colspan="8">No items found. Click + Add Item to start.</td></tr>';
  return items.map(i=>`<tr>
    <td><span style="font-family:'DM Mono',monospace;font-size:12px">${i.code}</span></td>
    <td>${i.name}</td>
    <td><span class="badge badge-${i.type.toLowerCase()}">${i.type}</span></td>
    <td>${i.item_categories?.name||'—'}</td>
    <td>${i.uom}</td>
    <td style="font-family:'DM Mono',monospace">${i.reorder_level||0}</td>
    <td><span class="badge ${i.is_active?'badge-pass':'badge-cancel'}">${i.is_active?'Active':'Inactive'}</span></td>
    <td><div class="action-btns">
      <button class="btn btn-ghost btn-sm edit-item" data-id="${i.id}">Edit</button>
      <button class="btn btn-red btn-sm del-item" data-id="${i.id}" data-name="${i.name}">Del</button>
    </div></td>
  </tr>`).join('');
}

function bindItemActions(items){
  document.querySelectorAll('.edit-item').forEach(btn=>btn.addEventListener('click',async()=>{
    const item=items.find(i=>i.id==btn.dataset.id);
    if(item)showItemModal(item,items);
  }));
  document.querySelectorAll('.del-item').forEach(btn=>btn.addEventListener('click',()=>confirmDelete('items',btn.dataset.id,btn.dataset.name)));
}

async function showItemModal(item=null){

  modal=`<div class="modal-overlay"><div class="modal">

      <div class="form-row">
        <div class="form-group"><label class="form-label">Item Code *</label><input class="form-input" id="i-code" value="${item?.code||''}" placeholder="RM01"/></div>

        <div class="form-group"><label class="form-label">Type *</label>
          <select class="form-select" id="i-type">

      <div class="form-row">
        <div class="form-group"><label class="form-label">UOM *</label><input class="form-input" id="i-uom" value="${item?.uom||'pcs'}" placeholder="kg/pcs/ltr"/></div>
        <div class="form-group"><label class="form-label">HSN Code</label><input class="form-input" id="i-hsn" value="${item?.hsn_code||''}" placeholder="68138100"/></div>
      </div>

        <div class="form-group"><label class="form-label">Reorder Level</label><input class="form-input" id="i-reorder" type="number" value="${item?.reorder_level||0}"/></div>
        <div class="form-group"><label class="form-label">Reorder Qty</label><input class="form-input" id="i-reorderqty" type="number" value="${item?.reorder_qty||0}"/></div>

      <button class="btn btn-ghost btn-sm" id="cm2">Cancel</button>
      <button class="btn btn-primary btn-sm" id="save-item">${item?'Update Item':'Save Item'}</button>

  render();
  document.getElementById('cm').addEventListener('click',closeModal);
  document.getElementById('cm2').addEventListener('click',closeModal);
  document.getElementById('save-item').addEventListener('click',()=>saveItem(item?.id));
}

async function saveItem(id=null){
  const payload={
    code:document.getElementById('i-code').value.trim().toUpperCase(),
    name:document.getElementById('i-name').value.trim(),
    type:document.getElementById('i-type').value,
    category_id:document.getElementById('i-cat').value||null,
    uom:document.getElementById('i-uom').value.trim(),
    hsn_code:document.getElementById('i-hsn').value.trim(),
    reorder_level:parseFloat(document.getElementById('i-reorder').value)||0,
    reorder_qty:parseFloat(document.getElementById('i-reorderqty').value)||0,
    notes:document.getElementById('i-notes').value.trim(),
  };
  if(!payload.code||!payload.name){document.getElementById('i-err').textContent='Code and Name required.';return;}
  const{error}=id?await db.from('items').update(payload).eq('id',id):await db.from('items').insert(payload);
  if(error){document.getElementById('i-err').textContent=error.message;return;}
  closeModal();
}

// ── CONFIRM DELETE ──
function confirmDelete(table,id,name){
  modal=`<div class="modal-overlay"><div class="modal confirm-modal">
    <div class="modal-head"><span class="modal-title">Confirm Delete</span><button class="modal-close" id="cm">×</button></div>
    <div class="modal-body"><p class="confirm-text">Are you sure you want to delete <strong>${name}</strong>? This cannot be undone.</p></div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" id="cm2">Cancel</button>
      <button class="btn btn-red btn-sm" id="confirm-del">Yes, Delete</button>
    </div>
  </div></div>`;
  render();
  document.getElementById('cm').addEventListener('click',closeModal);
  document.getElementById('cm2').addEventListener('click',closeModal);
  document.getElementById('confirm-del').addEventListener('click',async()=>{
    await db.from(table).delete().eq('id',id);
    closeModal();
  });
}

async function showBOMModal(bom=null){
  const[{data:items},{data:dies},{data:mixItems}]=await Promise.all([
    db.from('items').select('id,code,name,type').order('code'),
    db.from('dies').select('id,die_code,cavity_count').eq('is_active',true).order('die_code'),
    db.from('items').select('id,code,name').like('code','MIX-%').order('code')
  ]);

  const fgSfgItems=(items||[]).filter(i=>['FG','SFG'].includes(i.type));
  const isEdit=!!bom;

  modal=`<div class="modal-overlay"><div class="modal" style="max-width:680px">
    <div class="modal-head"><span class="modal-title">${isEdit?'Edit':'New'} BOM — Bill of Materials</span><button class="modal-close" id="cm">×</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Item (kya banana hai?) *</label>
        <select class="form-select" id="b-item">
          <option value="">-- Select FG/SFG Item --</option>
          ${fgSfgItems.map(i=>`<option value="${i.id}" ${bom?.item_id===i.id?'selected':''}>${i.code} — ${i.name} (${i.type})</option>`).join('')}
        </select>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Output Qty *</label><input class="form-input" id="b-qty" type="number" value="${bom?.output_qty||1}"/></div>
        <div class="form-group"><label class="form-label">Output UOM</label>
          <select class="form-select" id="b-uom">
            <option value="PCS" ${bom?.output_uom==='PCS'?'selected':''}>PCS</option>
            <option value="SET" ${bom?.output_uom==='SET'?'selected':''}>SET</option>
            <option value="KG" ${bom?.output_uom==='KG'?'selected':''}>KG</option>
          </select>
        </div>
      </div>

      <div style="background:var(--bg3);border-radius:8px;padding:12px 14px;margin-bottom:12px;border:1px solid var(--border)">
        <div style="font-size:12px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Manufacturing Parameters (Planning ke liye)</div>
        
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Mix Formula</label>
            <select class="form-select" id="b-mix" onchange="calcBOMParams()">
              <option value="">-- Select --</option>
              ${(mixItems||[]).map(m=>`<option value="${m.id}" ${bom?.mix_item_id===m.id?'selected':''}>${m.code} — ${m.name}</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Preform Weight (grams)</label>
            <input class="form-input" id="b-pfw" type="number" placeholder="e.g. 43" value="${bom?.preform_weight_grams||''}" oninput="calcBOMParams()"/>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Back Plate Weight (grams)</label>
            <input class="form-input" id="b-bpw" type="number" placeholder="e.g. 200" value="${bom?.bp_weight_grams||''}" oninput="calcBOMParams()"/>
          </div>
          <div class="form-group">
            <label class="form-label">Die</label>
            <select class="form-select" id="b-die" onchange="calcBOMParams()">
              <option value="">-- Select Die --</option>
              ${(dies||[]).map(d=>`<option value="${d.id}" data-cav="${d.cavity_count}" ${bom?.die_id===d.id?'selected':''}>${d.die_code} (${d.cavity_count} cavity)</option>`).join('')}
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Cavity Count</label>
            <input class="form-input" id="b-cav" type="number" placeholder="e.g. 8" value="${bom?.cavity_count||''}" oninput="calcBOMParams()"/>
          </div>
          <div class="form-group">
            <label class="form-label">Pcs per Oven Tray</label>
            <input class="form-input" id="b-tray" type="number" placeholder="e.g. 12" value="${bom?.pcs_per_tray||''}" oninput="calcBOMParams()"/>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Pcs per Set</label>
            <input class="form-input" id="b-set" type="number" value="${bom?.pcs_per_set||4}" oninput="calcBOMParams()"/>
          </div>
          <div class="form-group">
            <label class="form-label">Version</label>
            <input class="form-input" id="b-ver" type="number" value="${bom?.version||1}"/>
          </div>
        </div>

        <!-- Auto-calculated fields -->
        <div id="bom-calc" style="margin-top:8px;background:var(--bg2);border-radius:6px;padding:10px 12px;font-size:12px;color:var(--text2);display:none">
          <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;margin-bottom:6px">Auto Calculated</div>
          <div id="bom-calc-content"></div>
        </div>
      </div>

      <div class="form-group"><label class="form-label">Notes</label><textarea class="form-input" id="b-notes" style="min-height:50px">${bom?.notes||''}</textarea></div>
      <div id="b-err" class="err-msg"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" id="cm2">Cancel</button>
      <button class="btn btn-primary btn-sm" id="save-bom">${isEdit?'Update':'Create'} BOM</button>
    </div>
  </div></div>`;
  render();

  // Die select → auto fill cavity
  document.getElementById('b-die')?.addEventListener('change',function(){
    const opt=this.selectedOptions[0];
    if(opt?.dataset?.cav) document.getElementById('b-cav').value=opt.dataset.cav;
    calcBOMParams();
  });

  document.getElementById('cm').addEventListener('click',closeModal);
  document.getElementById('cm2').addEventListener('click',closeModal);
  document.getElementById('save-bom').addEventListener('click',async()=>{
    const itemId=document.getElementById('b-item').value;
    if(!itemId){document.getElementById('b-err').textContent='Item select karo.';return;}
    const qty=parseFloat(document.getElementById('b-qty').value)||1;
    const bpw=parseFloat(document.getElementById('b-bpw').value)||0;
    const pfw=parseFloat(document.getElementById('b-pfw').value)||0;
    const cav=parseInt(document.getElementById('b-cav').value)||0;
    const tray=parseInt(document.getElementById('b-tray').value)||0;
    const pset=parseInt(document.getElementById('b-set').value)||4;

    const payload={
      item_id:itemId,
      output_qty:qty,
      output_uom:document.getElementById('b-uom').value,
      version:parseInt(document.getElementById('b-ver').value)||1,
      is_active:true,
      notes:document.getElementById('b-notes').value,
      bp_weight_grams:bpw,
      preform_weight_grams:pfw,
      cavity_count:cav,
      pcs_per_tray:tray,
      pcs_per_set:pset,
      die_id:document.getElementById('b-die').value||null,
      mix_item_id:document.getElementById('b-mix').value||null,
      shot_blast_batch_pcs:bpw>0?Math.round(60000/bpw):0,
      oven_full_load_pcs:tray>0?tray*72:0
    };

    const{error}=isEdit?
      await db.from('bom_headers').update(payload).eq('id',bom.id):
      await db.from('bom_headers').insert(payload);
    if(error){document.getElementById('b-err').textContent=error.message;return;}
    closeModal();
  });
}

function calcBOMParams(){
  const bpw=parseFloat(document.getElementById('b-bpw')?.value)||0;
  const pfw=parseFloat(document.getElementById('b-pfw')?.value)||0;
  const cav=parseInt(document.getElementById('b-cav')?.value)||0;
  const tray=parseInt(document.getElementById('b-tray')?.value)||0;
  const el=document.getElementById('bom-calc');
  const content=document.getElementById('bom-calc-content');
  if(!el||!content) return;

  const rows=[];
  if(bpw>0) rows.push(`Shot Blast batch: <strong style="color:var(--text)">${Math.round(60000/bpw)} pcs</strong> (60kg ÷ ${bpw}g)`);
  if(tray>0) rows.push(`Oven full load: <strong style="color:var(--text)">${tray*72} pcs</strong> (72 trays × ${tray})`);
  if(cav>0) rows.push(`Moulding per shift: <strong style="color:var(--text)">${Math.floor(480/8.5)*cav} pcs</strong> (${cav} cav × 56 cycles)`);
  if(pfw>0) rows.push(`Mix per 1000 pcs: <strong style="color:var(--text)">${(pfw*1000/1000).toFixed(1)} kg</strong> MIX needed`);

  if(rows.length){
    el.style.display='block';
    content.innerHTML=rows.map(r=>`<div style="margin-bottom:4px">→ ${r}</div>`).join('');
  } else {
    el.style.display='none';
  }
}

async function saveStock(){
  const item_id=document.getElementById('s-item').value;
  const txn_type=document.getElementById('s-type').value;
  const qty=parseFloat(document.getElementById('s-qty').value)||0;
  const uom=document.getElementById('s-uom').value;
  if(!item_id||qty===0){document.getElementById('s-err').textContent='Item and quantity required.';return;}
  await db.from('inventory_transactions').insert({item_id,txn_type,qty,uom,batch_no:document.getElementById('s-batch').value,reference_no:document.getElementById('s-ref').value});
  const isOut=['Sales Dispatch','Production Issue'].includes(txn_type);
  const delta=isOut?-qty:qty;
  const{data:ex}=await db.from('inventory').select('*').eq('item_id',item_id).single();
  if(ex)await db.from('inventory').update({current_stock:(ex.current_stock||0)+delta,uom,last_updated:new Date().toISOString()}).eq('item_id',item_id);
  else await db.from('inventory').insert({item_id,current_stock:delta,uom});
  closeModal();
}

async function showPurchaseModal(){

  ]);
  const now=new Date().toISOString().split('T')[0];
  let poLines=[{itemId:'',itemLabel:'',qty:0,uom:'KG',rate:0,gst:18}];

  function renderPOLines(){
    const el=document.getElementById('po-lines');
    if(!el) return;
    el.innerHTML=poLines.map((line,idx)=>`
      <div style="display:grid;grid-template-columns:2fr 80px 60px 90px 60px 30px;gap:6px;align-items:center;margin-bottom:6px">
        <div id="po-line-item-${idx}"></div>
        <input type="number" class="form-input" style="padding:6px 8px;font-size:12px" placeholder="Qty" value="${line.qty}" onchange="poLines[${idx}].qty=parseFloat(this.value)||0"/>
        <input class="form-input" style="padding:6px 8px;font-size:12px" placeholder="UOM" value="${line.uom}" onchange="poLines[${idx}].uom=this.value"/>
        <input type="number" class="form-input" style="padding:6px 8px;font-size:12px" placeholder="Rate ₹" value="${line.rate}" onchange="poLines[${idx}].rate=parseFloat(this.value)||0;updatePOTotal()"/>
        <input type="number" class="form-input" style="padding:6px 8px;font-size:12px" placeholder="GST%" value="${line.gst}" onchange="poLines[${idx}].gst=parseFloat(this.value)||0"/>
        <button onclick="poLines.splice(${idx},1);renderPOLines()" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:18px">×</button>
      </div>`).join('');
    poLines.forEach((line,i)=>{
      setTimeout(()=>{
        smartSelect('po-line-item-'+i,(rmItems||[]).map(it=>({id:it.id,label:it.code+' — '+it.name})),line.itemId||null,(id,label)=>{poLines[i].itemId=id;poLines[i].itemLabel=label;// Auto-fill UOM
          const item=rmItems?.find(it=>it.id==id);if(item?.uom){poLines[i].uom=item.uom;}},()=>quickAddItem('po-line-item-'+i));
      },50);
    });
    updatePOTotal();
  }

  function updatePOTotal(){
    let sub=0;
    poLines.forEach(l=>{sub+=l.qty*l.rate;});
    const gst=poLines.reduce((s,l)=>s+(l.qty*l.rate*l.gst/100),0);
    const el=document.getElementById('po-total');
    if(el) el.innerHTML=`<span style="color:var(--text2)">Subtotal: </span><strong>₹${sub.toLocaleString('en-IN')}</strong> + GST <strong>₹${gst.toLocaleString('en-IN',{maximumFractionDigits:0})}</strong> = <strong style="color:var(--green)">₹${(sub+gst).toLocaleString('en-IN',{maximumFractionDigits:0})}</strong>`;
  }

  modal=`<div class="modal-overlay"><div class="modal" style="max-width:700px">
    <div class="modal-head"><span class="modal-title">New Purchase Order</span><button class="modal-close" id="cm">×</button></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label class="form-label">PO Number</label><input class="form-input" id="pur-no" value="PUR-${Date.now().toString().slice(-6)}"/></div>
        <div class="form-group"><label class="form-label">Supplier *</label>
          <div id="pur-sup-wrap"></div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Order Date</label><input class="form-input" id="pur-date" type="date" value="${now}"/></div>
        <div class="form-group"><label class="form-label">Expected Date</label><input class="form-input" id="pur-exp" type="date"/></div>
      </div>
      <div class="form-group">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <label class="form-label" style="margin:0">Materials *</label>
          <button type="button" class="btn btn-green btn-sm" onclick="poLines.push({itemId:'',itemLabel:'',qty:0,uom:'KG',rate:0,gst:18});renderPOLines()">+ Add Material</button>
        </div>
        <div id="po-lines" style="background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:10px"></div>
        <div id="po-total" style="margin-top:8px;font-size:13px;text-align:right;padding:6px 10px;background:var(--bg3);border-radius:6px"></div>
      </div>
      <div class="form-group"><label class="form-label">Notes</label><textarea class="form-input" id="pur-notes" style="min-height:50px"></textarea></div>
      <div id="pur-err" class="err-msg"></div>
    </div>
    <div class="modal-footer"><button class="btn btn-ghost btn-sm" id="cm2">Cancel</button><button class="btn btn-primary btn-sm" id="save-pur">Create PO</button></div>
  </div></div>`;
  render();
  smartSelect('pur-sup-wrap',(sups||[]).map(s=>({id:s.id,label:s.name})),null,(id)=>{},()=>quickAddSupplier('pur-sup-wrap'));
  renderPOLines();
  document.getElementById('cm').addEventListener('click',closeModal);
  document.getElementById('cm2').addEventListener('click',closeModal);
  document.getElementById('save-pur').addEventListener('click',async()=>{
    const wrap=document.getElementById('pur-sup-wrap');
    const sup=wrap?._ssData?.selectedId||'';
    if(!sup){document.getElementById('pur-err').textContent='Supplier select karo.';return;}
    const validLines=poLines.filter(l=>l.itemId&&l.qty>0);
    if(!validLines.length){document.getElementById('pur-err').textContent='Kam se kam 1 item add karo.';return;}
    const subtotal=validLines.reduce((s,l)=>s+l.qty*l.rate,0);
    const gstAmt=validLines.reduce((s,l)=>s+(l.qty*l.rate*l.gst/100),0);
    const{data:po,error}=await db.from('purchase_orders').insert({
      po_no:document.getElementById('pur-no').value,
      supplier_id:sup,
      order_date:document.getElementById('pur-date').value,
      expected_date:document.getElementById('pur-exp').value||null,
      notes:document.getElementById('pur-notes').value,
      total_amount:subtotal+gstAmt,
      status:'Ordered'
    }).select().single();
    if(error){document.getElementById('pur-err').textContent=error.message;return;}
    await db.from('purchase_order_lines').insert(validLines.map(l=>({
      po_id:po.id,item_id:l.itemId,qty:l.qty,uom:l.uom,
      unit_price:l.rate,gst_percent:l.gst
    })));
    closeModal();
    showToast('✓ Purchase Order created — '+po.po_no);
  });
}

    const wrap=document.getElementById('so-cust-wrap');
    const cust=wrap?._ssData?.selectedId||'';
    if(!cust){document.getElementById('so-err').textContent='Customer select karo.';return;}
    const validLines=soLines.filter(l=>l.itemId&&l.qty>0);
    if(!validLines.length){document.getElementById('so-err').textContent='Kam se kam 1 item add karo.';return;}
    const subtotal=validLines.reduce((s,l)=>s+l.qty*l.rate,0);
    const gstAmt=validLines.reduce((s,l)=>s+(l.qty*l.rate*l.gst/100),0);
    const total=subtotal+gstAmt;
    const{data:so,error}=await db.from('sales_orders').insert({
      so_no:document.getElementById('so-no').value,
      customer_id:cust,
      order_date:document.getElementById('so-date').value,
      delivery_date:document.getElementById('so-del').value||null,
      notes:document.getElementById('so-notes').value,
      total_amount:total,
      status:'Confirmed'
    }).select().single();
    if(error){document.getElementById('so-err').textContent=error.message;return;}
    // Save lines
    await db.from('sales_order_lines').insert(validLines.map(l=>({
      so_id:so.id,item_id:l.itemId,qty:l.qty,uom:l.uom,
      unit_price:l.rate,gst_percent:l.gst,
      total_amount:l.qty*l.rate*(1+l.gst/100)
    })));
    closeModal();
    showToast('✓ Sales Order created — '+so.so_no);
  });
}

// ── SUPPLIERS ──
async function loadSuppliers(el,acts){
  if(acts)acts.innerHTML=`<button class="btn btn-primary btn-sm" id="add-sup-btn">+ Add Supplier</button>`;
  const{data:sups}=await db.from('suppliers').select('*').order('name');
  el.innerHTML=`<div class="table-wrap">
    <div class="table-header"><span class="table-title">Suppliers (${sups?.length||0})</span></div>
    <table><thead><tr><th>Code</th><th>Name</th><th>GSTIN</th><th>Phone</th><th>Email</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody>${(sups||[]).length?(sups||[]).map(s=>`<tr>
      <td style="font-family:'DM Mono',monospace;font-size:12px">${s.code}</td>
      <td>${s.name}</td><td>${s.gstin||'—'}</td><td>${s.phone||'—'}</td><td>${s.email||'—'}</td>
      <td><span class="badge ${s.is_active?'badge-pass':'badge-cancel'}">${s.is_active?'Active':'Inactive'}</span></td>
      <td><div class="action-btns">
        <button class="btn btn-ghost btn-sm edit-sup" data-id="${s.id}">Edit</button>
        <button class="btn btn-red btn-sm del-sup" data-id="${s.id}" data-name="${s.name}">Del</button>
      </div></td>
    </tr>`).join(''):'<tr class="empty-row"><td colspan="7">No suppliers yet.</td></tr>'}</tbody>
    </table></div>`;
  document.getElementById('add-sup-btn')?.addEventListener('click',()=>showPartyModal('supplier'));
  document.querySelectorAll('.edit-sup').forEach(btn=>btn.addEventListener('click',()=>{const s=(sups||[]).find(x=>x.id==btn.dataset.id);if(s)showPartyModal('supplier',s);}));
  document.querySelectorAll('.del-sup').forEach(btn=>btn.addEventListener('click',()=>confirmDelete('suppliers',btn.dataset.id,btn.dataset.name)));
}

async function showPartyModal(type,item=null){
  const isSup=type==='supplier';
  const code=item?.code||(isSup?'SUP':'CUS')+'-'+Date.now().toString().slice(-4);
  modal=`<div class="modal-overlay"><div class="modal">
    <div class="modal-head"><span class="modal-title">${item?'Edit':'Add'} ${isSup?'Supplier':'Customer'}</span><button class="modal-close" id="cm">×</button></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label class="form-label">Code *</label><input class="form-input" id="p-code" value="${code}"/></div>
        <div class="form-group"><label class="form-label">Name *</label><input class="form-input" id="p-name" value="${item?.name||''}" placeholder="Company name"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">GSTIN</label><input class="form-input" id="p-gst" value="${item?.gstin||''}" placeholder="27AABCU9603R1ZX"/></div>
        <div class="form-group"><label class="form-label">Phone</label><input class="form-input" id="p-phone" value="${item?.phone||''}" placeholder="+91 98765 43210"/></div>
      </div>
      <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="p-email" type="email" value="${item?.email||''}"/></div>
      <div class="form-group"><label class="form-label">Address</label><textarea class="form-input" id="p-addr">${item?.address||''}</textarea></div>
      <div id="p-err" class="err-msg"></div>
    </div>
    <div class="modal-footer"><button class="btn btn-ghost btn-sm" id="cm2">Cancel</button><button class="btn btn-primary btn-sm" id="save-party">${item?'Update':'Save'}</button></div>
  </div></div>`;
  render();
  document.getElementById('cm').addEventListener('click',closeModal);
  document.getElementById('cm2').addEventListener('click',closeModal);
  document.getElementById('save-party').addEventListener('click',async()=>{
    const code=document.getElementById('p-code').value.trim();
    const name=document.getElementById('p-name').value.trim();
    if(!code||!name){document.getElementById('p-err').textContent='Code and Name required.';return;}
    const payload={code,name,gstin:document.getElementById('p-gst').value,phone:document.getElementById('p-phone').value,email:document.getElementById('p-email').value,address:document.getElementById('p-addr').value};
    const tbl=isSup?'suppliers':'customers';
    const{error}=item?await db.from(tbl).update(payload).eq('id',item.id):await db.from(tbl).insert(payload);
    if(error){document.getElementById('p-err').textContent=error.message;return;}
    closeModal();
  });
}

async function boot(){
  const{data:{session}}=await db.auth.getSession();
  if(session){user=session.user;await loadProfile();page='dashboard';}
  render();
}
boot();
